      <div style="background:${outOfStock?"#FFF0F0":"white"};border-radius:14px;padding:13px 10px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.04);border:1.5px solid ${outOfStock?"#F0C8C8":"#C8D8EC"};">
        <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:${outOfStock?"#C07878":"#4878A8"};">${outOfStock}</div>

      </div>

      <div style="font-size:11px;font-weight:800;color:var(--ink-light);">${topInvCat[1]} item${topInvCat[1]!==1?"s":""}</div>

    ${lowStockCount?`<div style="background:#FFF0F0;border:1.5px solid #F0C8C8;border-radius:12px;padding:10px 14px;margin-bottom:12px;"><div style="font-size:11px;font-weight:900;color:#C07878;margin-bottom:6px;">⚠️ Low Stock Alert</div>${lowStock.map(i=>`<span style="background:white;border:1px solid #F0C8C8;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:800;color:#C07878;margin:2px;display:inline-block;">${i.name} (${i.qty})</span>`).join("")}</div>`:""}

function addInventoryItem(){
  const name=document.getElementById("invName")?.value?.trim();if(!name)return;
  const qty=parseInt(document.getElementById("invQty")?.value)||1;
  const min=parseInt(document.getElementById("invMin")?.value)||1;
  const cat=document.getElementById("invCat")?.value||"Other";
  const items=lda("inventory");
  items.push({id:Date.now().toString(),name,qty,min,cat,notes:""});
  sva("inventory",items);renderInventory();
}
function adjInv(id,delta){const items=lda("inventory");const i=items.find(i=>i.id===id);if(i){i.qty=Math.max(0,i.qty+delta);}sva("inventory",items);renderInventory();}
function delInv(id){sva("inventory",lda("inventory").filter(i=>i.id!==id));renderInventory();}

// ── MEDICINE TRACKER ──────────────────────────────────────────────────────────

function renderMedicine(){
  document.getElementById("accentStrip").style.background="linear-gradient(90deg,#D8C8E8,#C8B8D8,#D0C0E0)";
  const meds=lda("medicines");
  const taken=ldo("med_taken");
  const dayKey=`med_${medDate}`;
  const dayTaken=ldo(dayKey);
  function prevMedDay(){const d=new Date(medDate+"T12:00:00");d.setDate(d.getDate()-1);medDate=d.toISOString().split("T")[0];renderMedicine();}
  function nextMedDay(){const d=new Date(medDate+"T12:00:00");d.setDate(d.getDate()+1);medDate=d.toISOString().split("T")[0];renderMedicine();}
  const allTodayTaken=meds.length>0&&meds.every(m=>MED_TIMES.every(t=>dayTaken[`${m.id}_${t}`]));
  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">Medicine Tracker</div>
    <div class="section-sub">💊 Daily medication log</div>
    <div class="divider"></div>
    <div class="med-add-grid">
      <input class="med-input" id="medName" placeholder="Medication name..." maxlength="40"/>
      <input class="med-input" id="medDose" placeholder="Dosage (e.g. 10mg)..." maxlength="30"/>
      <div class="med-add-full" style="display:flex;gap:8px;flex-wrap:wrap;" id="medTimeSel">
        ${MED_TIMES.map(t=>`<label style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--ink-mid);cursor:pointer;"><input type="checkbox" value="${t}" style="accent-color:#B4A8D8;width:14px;height:14px;"> ${t}</label>`).join("")}
      </div>
      <button class="med-add-btn med-add-full" onclick="addMed()">+ Add Medication</button>
    </div>
    <div class="med-date-nav">
      <button class="med-date-btn" onclick="prevMedDay()">◀</button>
      <div class="med-date-label">${fmtDate(medDate)}${medDate===tds()?" 🌸":""}</div>
      <button class="med-date-btn" onclick="nextMedDay()">▶</button>
      <button class="med-date-btn" onclick="medDate=tds();renderMedicine()" style="font-size:10px">Today</button>
    </div>
    ${allTodayTaken&&meds.length?`<div style="background:#EDFFF5;border:1.5px solid #90C8A8;border-radius:12px;padding:10px;text-align:center;margin-bottom:12px;font-size:13px;font-weight:800;color:#3A8860;">✅ All medications taken today!</div>`:""}
    ${meds.length===0?`<div style="text-align:center;padding:24px;color:var(--ink-light);font-size:13px;font-weight:700;">💊 No medications yet. Add one above!</div>`:""}
    ${meds.map(med=>{
      const selectedTimes=med.times||["Morning"];
      return`<div class="med-card">
        <div class="med-card-top">
          <div class="med-icon">💊</div>
          <div><div class="med-name">${med.name}</div><div class="med-dose">${med.dose||""}${med.dose&&selectedTimes.length?" · ":""}${selectedTimes.join(", ")}</div></div>
          <button class="med-del-btn" onclick="delMed('${med.id}')">✕</button>
        </div>
        <div class="med-times">
          ${selectedTimes.map(t=>{const key=`${med.id}_${t}`;const taken=dayTaken[key];return`<div class="med-time-chk ${taken?"taken":""}" onclick="toggleMedTaken('${med.id}','${t}')">${taken?"✓":""} ${t}</div>`;}).join("")}
        </div>
      </div>`;
    }).join("")}
    <div style="margin-top:14px"><div class="sec-label">📝 Notes for ${fmtDate(medDate)}</div><textarea class="box-textarea" style="min-height:60px;" placeholder="Any notes, side effects, or observations..." onchange="sv('med_note_${medDate}',this.value)">${ld("med_note_"+medDate)}</textarea></div>
  `;
  // Attach prevMedDay nextMedDay as globals for the onclick inline  
  window.prevMedDay=prevMedDay;window.nextMedDay=nextMedDay;
}

// ═══════════════════════════════════════════════════════════════════════════════
// ── BLOOD PRESSURE TRACKER ────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
function bpStatus(sys,dia){
  if(sys<120&&dia<80)return{label:"Normal",cls:"normal"};
  if(sys<130&&dia<80)return{label:"Elevated",cls:"elevated"};
  if(sys<140||dia<90)return{label:"High S1",cls:"high"};
  return{label:"High S2",cls:"high"};
}
function renderBP(){
  document.getElementById("accentStrip").style.background="linear-gradient(90deg,#F0C8C8,#E8B8B8,#F0C0C8)";
  const records=lda("bp_records").slice(0,30);
  const avgSys=records.length?Math.round(records.slice(0,7).reduce((s,r)=>s+r.sys,0)/Math.min(records.length,7)):0;
  const avgDia=records.length?Math.round(records.slice(0,7).reduce((s,r)=>s+r.dia,0)/Math.min(records.length,7)):0;
  const avgPul=records.length?Math.round(records.slice(0,7).reduce((s,r)=>s+r.pulse,0)/Math.min(records.length,7)):0;

  // Mini SVG chart
  let chartSvg="";
  if(records.length>=2){
    const pts=records.slice(0,14).reverse();const n=pts.length;
    const w=460,h=90,pad=20;
    const allSys=pts.map(r=>r.sys),allDia=pts.map(r=>r.dia);
    const minV=Math.min(...allDia)-10,maxV=Math.max(...allSys)+10;
    const px=(i)=>pad+(i/(n-1))*(w-pad*2);
    const py=(v)=>h-pad-((v-minV)/(maxV-minV))*(h-pad*2);
    const sysLine=pts.map((r,i)=>`${i===0?"M":"L"}${px(i)},${py(r.sys)}`).join(" ");
    const diaLine=pts.map((r,i)=>`${i===0?"M":"L"}${px(i)},${py(r.dia)}`).join(" ");
    chartSvg=`<svg class="bp-chart-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      <line x1="${pad}" y1="${py(120)}" x2="${w-pad}" y2="${py(120)}" stroke="#C8E8D0" stroke-width="1" stroke-dasharray="4,3"/>
      <line x1="${pad}" y1="${py(80)}"  x2="${w-pad}" y2="${py(80)}"  stroke="#E8C8C8" stroke-width="1" stroke-dasharray="4,3"/>
      <path d="${sysLine}" stroke="#E8888A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="${diaLine}" stroke="#88A8D8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      ${pts.map((r,i)=>`<circle cx="${px(i)}" cy="${py(r.sys)}" r="3.5" fill="#E8888A"/><circle cx="${px(i)}" cy="${py(r.dia)}" r="3.5" fill="#88A8D8"/>`).join("")}
    </svg>`;
  }

  const selArm=window._bpArm||"Left";
  const selTime=window._bpTime||"Morning";
  const armBtns=[{v:"Left",l:"💪 Left"},{v:"Right",l:"💪 Right"}];
  const timeBtns=[{v:"Morning",l:"🌅 Morning"},{v:"Afternoon",l:"☀️ Afternoon"},{v:"Night",l:"🌙 Night"}];
  const armStyle=(v)=>v===selArm?"background:#FFF0F4;border-color:#F0C0C8;color:#C07880;font-weight:900":"background:white;color:var(--ink-mid)";
  const timeStyle=(v)=>v===selTime?"background:#FFF8EE;border-color:#F0D8A0;color:#A07020;font-weight:900":"background:white;color:var(--ink-mid)";

  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">Blood Pressure</div>
    <div class="section-sub">❤️ Track your readings over time</div>
    <div class="divider"></div>
    <div class="bp-add-card">
      <div class="bp-add-title">📝 Log New Reading</div>
      <div class="bp-inputs">
        <div class="bp-field"><div class="bp-field-lbl">Systolic</div><input class="bp-input" id="bpSys" type="number" placeholder="120" min="50" max="250"/></div>
        <div class="bp-field"><div class="bp-field-lbl">Diastolic</div><input class="bp-input" id="bpDia" type="number" placeholder="80" min="30" max="150"/></div>
        <div class="bp-field"><div class="bp-field-lbl">Pulse</div><input class="bp-input" id="bpPulse" type="number" placeholder="72" min="30" max="200"/></div>
        <div class="bp-field"><div class="bp-field-lbl">Date</div><input class="bp-input" id="bpDate" type="date" value="${tds()}" style="font-size:11px;padding:6px 4px;"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
        <div>
          <div style="font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);margin-bottom:6px;">💪 Arm</div>
          <div style="display:flex;gap:6px;">
            ${armBtns.map(b=>`<button onclick="window._bpArm='${b.v}';renderBP()" style="flex:1;border:1.5px solid #EDE0D8;border-radius:10px;padding:8px 4px;font-family:'Nunito',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;${armStyle(b.v)}">${b.l}</button>`).join("")}
          </div>
        </div>
        <div>
          <div style="font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);margin-bottom:6px;">🕐 Time of Day</div>
          <div style="display:flex;gap:5px;">
            ${timeBtns.map(b=>`<button onclick="window._bpTime='${b.v}';renderBP()" style="flex:1;border:1.5px solid #EDE0D8;border-radius:10px;padding:8px 2px;font-family:'Nunito',sans-serif;font-size:10px;cursor:pointer;transition:all .15s;${timeStyle(b.v)}">${b.l}</button>`).join("")}
          </div>
        </div>
      </div>
      <input class="bp-input" id="bpNote" placeholder="Notes (optional)..." style="width:100%;margin-bottom:10px;text-align:left;font-size:12px;"/>
      <button class="bp-save-btn" onclick="addBPRecord()">+ Save Reading</button>
    </div>
    ${records.length>=2?`
    <div class="bp-chart-wrap">
      <div class="bp-chart-title">📈 Recent Trend (last ${Math.min(records.length,14)} readings)</div>
      ${chartSvg}
      <div class="bp-legend"><span><span class="bp-leg-dot" style="background:#E8888A"></span>Systolic</span><span><span class="bp-leg-dot" style="background:#88A8D8"></span>Diastolic</span><span style="color:#AAA">— 120/80 guideline</span></div>
    </div>`:""}
    ${records.length>=3?`
    <div class="bp-stats-row">
      <div class="bs-card"><div class="bs-val" style="color:#E8888A">${avgSys}</div><div class="bs-lbl">Avg Sys (7d)</div></div>
      <div class="bs-card"><div class="bs-val" style="color:#88A8D8">${avgDia}</div><div class="bs-lbl">Avg Dia (7d)</div></div>
      <div class="bs-card"><div class="bs-val">${avgPul}</div><div class="bs-lbl">Avg Pulse (7d)</div></div>
    </div>`:""}
    <div class="bp-log">
      <div class="bp-log-title">📋 Reading Log</div>
      ${records.length===0?`<div style="text-align:center;padding:16px;color:var(--ink-light);font-size:13px;font-weight:700;">No readings yet. Log your first reading above!</div>`:""}
      ${records.map(r=>{
        const st=bpStatus(r.sys,r.dia);
        const armTag=r.arm?`<span style="font-size:9px;font-weight:800;background:#F0E8F8;color:#8868B0;border-radius:7px;padding:1px 6px;">💪 ${r.arm}</span>`:"";
        const timeTag=r.timeOfDay?`<span style="font-size:9px;font-weight:800;background:#F8F0E0;color:#A07020;border-radius:7px;padding:1px 6px;">${r.timeOfDay==="Morning"?"🌅":r.timeOfDay==="Afternoon"?"☀️":"🌙"} ${r.timeOfDay}</span>`:"";
        return`<div class="bp-entry">
          <div style="min-width:0;flex:1">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px;">
              <div class="bp-date-lbl" style="min-width:auto">${fmtDate(r.date)}</div>
              ${armTag}${timeTag}
              <span class="bp-status ${st.cls}">${st.label}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="bp-reading"><span style="color:#E8888A">${r.sys}</span><span>/</span><span style="color:#88A8D8">${r.dia}</span> <span style="font-size:11px;color:var(--ink-light)">mmHg</span></div>
              <div class="bp-pulse">♥ ${r.pulse||"—"}</div>
            </div>
            ${r.note?`<div style="font-size:11px;color:var(--ink-light);margin-top:2px;font-style:italic;">${r.note}</div>`:""}
          </div>
          <button class="bp-del" onclick="delBP('${r.id}')">✕</button>
        </div>`;
      }).join("")}
    </div>
  `;
}
function addBPRecord(){
  const sys=parseInt(document.getElementById("bpSys")?.value);
  const dia=parseInt(document.getElementById("bpDia")?.value);
  const pulse=parseInt(document.getElementById("bpPulse")?.value)||0;
  const date=document.getElementById("bpDate")?.value||tds();
  const note=document.getElementById("bpNote")?.value?.trim();
  if(!sys||!dia){alert("Please enter systolic and diastolic values.");return;}
  const arm=window._bpArm||"Left";
  const timeOfDay=window._bpTime||"Morning";
  const records=lda("bp_records");
  records.unshift({id:Date.now().toString(),sys,dia,pulse,date,note,arm,timeOfDay});
  sva("bp_records",records);renderBP();
}
function delBP(id){sva("bp_records",lda("bp_records").filter(r=>r.id!==id));renderBP();}

const PAGE_COLORS=[
  {name:"Rose",    top:"#F0A8B8", bg:"#FFF5F8", border:"#EDD0D8"},
  {name:"Lavender",top:"#C0AEE0", bg:"#F8F5FF", border:"#D8D0F0"},
  {name:"Mint",    top:"#88C8A8", bg:"#F0FFF8", border:"#C0E8D0"},
  {name:"Sky",     top:"#88B8D8", bg:"#F0F8FF", border:"#C0D8EC"},
  {name:"Peach",   top:"#F0C090", bg:"#FFF8EE", border:"#F0D8B8"},
  {name:"Sage",    top:"#A0B898", bg:"#F4F8F2", border:"#C8D8C0"},
];

function getPages(){return lda("journal_pages");}
function savePages(pages){sva("journal_pages",pages);}

function renderPages(){
  curPageId=null;
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.pages;
  const pages=getPages();

  const actionBtns=`
    <button class="new-page-btn" onclick="addNewPage()" style="margin-bottom:8px;">✦ New Blank Page</button>

        <div style="font-size:22px;margin-bottom:4px;">🌙</div>Monthly Reset
      </button>
      <button onclick="showSection('weekly_reset')" style="border:1.5px solid #C8D8C8;border-radius:14px;padding:12px 8px;background:linear-gradient(135deg,#F5FFF5,#E8F5E8);font-size:12px;font-weight:800;color:#507050;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;text-align:center;line-height:1.4;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">

      <div class="section-heading">My Pages</div>

      <div class="pages-empty">

  const grid=pages.map((p)=>{

    return`<div class="page-thumb" style="border-color:${col.border};background:${col.bg};" onclick="openPage('${p.id}')">
      <div style="position:absolute;top:0;left:0;right:0;height:4px;background:${col.top};border-radius:4px 4px 0 0;"></div>
      <button class="page-thumb-del" onclick="event.stopPropagation();deletePage('${p.id}')">✕</button>
      <div class="page-thumb-title">${p.title||"Untitled"}</div>
      <div class="page-thumb-preview">${preview}</div>
      <div class="page-thumb-meta">${p.date}${p.tag?` · ${p.tag}`:""}</div>
    </div>`;
  }).join("");

  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">My Pages</div>
    <div class="section-sub">📓 ${pages.length} page${pages.length!==1?"s":""}</div>
    <div class="divider"></div>
    ${actionBtns}
    <div class="pages-index">${grid}</div>
  `;
}

function addNewPage(){
  const pages=getPages();
  const id=Date.now().toString();
  const newPage={
    id,
    title:"",
    content:"",
    date:tds(),
    tag:"",
    colorIdx:pages.length%PAGE_COLORS.length,
  };
  pages.unshift(newPage);
  savePages(pages);
  openPage(id);
}

function openPage(id){
  curPageId=id;
  const pages=getPages();
  const p=pages.find(p=>p.id===id);
  if(!p)return;
  const col=PAGE_COLORS[p.colorIdx||0];

  const colorDots=PAGE_COLORS.map((c,i)=>
    `<div class="lp-color-dot ${p.colorIdx===i?"sel":""}" style="background:${c.top}" onclick="setPageColor('${id}',${i})" title="${c.name}"></div>`
  ).join("");

  document.getElementById("accentStrip").style.background=`linear-gradient(90deg,${col.top},${col.border},transparent)`;
  document.getElementById("pageInner").innerHTML=`
    <button class="lp-back-btn" onclick="renderPages()">◀ All Pages</button>

    <div class="lined-page">
      <div class="lp-header" style="background:${col.bg};border-bottom-color:${col.border}">
        <input class="lp-title-input" placeholder="Page Title..." value="${(p.title||"").replace(/"/g,"&quot;")}"
          onchange="updatePage('${id}','title',this.value)"
          style="color:${col.top};caret-color:${col.top};"/>
        <div class="lp-meta-row">
          <span class="lp-date">${new Date(p.date+"T12:00:00").toLocaleDateString("en",{weekday:"short",month:"long",day:"numeric",year:"numeric"})}</span>
          <input class="lp-tag-input" placeholder="tag..." value="${p.tag||""}"
            onchange="updatePage('${id}','tag',this.value)"
            style="border-color:${col.border};"/>
          <div class="lp-color-dots">${colorDots}</div>
        </div>
      </div>
      <div class="lp-body">
        <textarea class="lp-textarea" id="lpText" placeholder="Write freely on these lined pages...

Your thoughts, prayers, ideas, reflections — this is your space. 🌸"
          onchange="updatePage('${id}','content',this.value)"
          onfocus="autoGrow(this)"
          oninput="autoGrow(this)">${(p.content||"").replace(/</g,"&lt;")}</textarea>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <button onclick="duplicatePage('${id}')" style="flex:1;border:1.5px solid ${col.border};border-radius:10px;padding:8px;background:${col.bg};font-size:11px;font-weight:800;color:${col.top};cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;">⊕ Duplicate</button>
      <button onclick="deletePage('${id}')" style="flex:1;border:1.5px solid #EDE0D8;border-radius:10px;padding:8px;background:white;font-size:11px;font-weight:800;color:var(--ink-light);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;">✕ Delete Page</button>
    </div>
  `;

  // Auto-grow textarea to fit content
  setTimeout(()=>{
    const ta=document.getElementById("lpText");
    if(ta)autoGrow(ta);
  },50);
}

function autoGrow(el){
  el.style.height="auto";
  el.style.height=Math.max(420,el.scrollHeight)+"px";
}

function updatePage(id,field,value){
  const pages=getPages();
  const p=pages.find(p=>p.id===id);
  if(!p)return;
  p[field]=value;
  savePages(pages);
}

function setPageColor(id,colorIdx){
  updatePage(id,"colorIdx",colorIdx);
  openPage(id);
}

function deletePage(id){
  if(!confirm("Delete this page? This cannot be undone."))return;
  savePages(getPages().filter(p=>p.id!==id));
  renderPages();
}

function duplicatePage(id){
  const pages=getPages();
  const p=pages.find(p=>p.id===id);
  if(!p)return;
  const copy={...p,id:Date.now().toString(),title:(p.title||"Untitled")+" (copy)",date:tds()};
  pages.unshift(copy);
  savePages(pages);
  openPage(copy.id);
}

// ── WEEKLY RESET  — 52 individual pages for 2026
// ═══════════════════════════════════════════════════════════════════════════════
function renderWeeklyReset(){
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.weekly_reset;
  const nowDOY=todayDOY();const nowWk=weekNum(nowDOY);
  const fmt=d=>d.toLocaleDateString("en",{month:"short",day:"numeric"});

  // Build all 52 weeks of 2026
  let pills="";
  for(let w=1;w<=52;w++){
    const sd=weekStart(w);if(sd>365)break;
    const ed=Math.min(sd+6,365);
    const a=dateFromDOY(sd),b=dateFromDOY(ed);
    const wk=`wr_2026_${w}`;const d=ldo(wk);
    const started=Object.keys(d).length>0;
    const isCur=w===nowWk;
    pills+=`<div class="week-pill-card ${started?"started":""}" style="${isCur?"border-color:#508060;background:#EDFFF5;":""}" onclick="openWeeklyResetPage(${w})">
      <div class="wpc-num" style="color:${isCur?"#407050":"var(--ink)"}">${w}</div>
      <div class="wpc-dates">${fmt(a)}<br>${fmt(b)}</div>
      ${isCur?`<div class="wpc-dot" style="background:#508060;"></div>`:""}
      ${started&&!isCur?`<div class="wpc-dot"></div>`:""}
    </div>`;
  }

  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">🌱 Weekly Reset</div>
    <div class="section-sub">Reflect & renew — all 52 weeks · 2026</div>
    <div class="divider"></div>
    <div class="week-pill-grid">${pills}</div>
  `;
}

function openWeeklyResetPage(wn){
  const sd=weekStart(wn);const ed=Math.min(sd+6,365);
  const a=dateFromDOY(sd),b=dateFromDOY(ed);
  const fmt=d=>d.toLocaleDateString("en",{month:"long",day:"numeric"});
  const wk=`wr_2026_${wn}`;const d=ldo(wk);
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.weekly_reset;

    const on=stored===n;const col=n<=3?"#F0A8A8":n<=6?"#F0D090":"#A8D8A8";
    return`<button class="rate-btn ${on?"on":""}" style="${on?`background:${col};border-color:${col}`:""}" onclick="saveWR('${wk}','${field}',${n});openWeeklyResetPage(${wn})">${n}</button>`;

      <div class="reset-section">
        <div class="reset-sec-lbl" style="color:#508060">🏆 Weekly Wins (3)</div>
        ${[1,2,3].map(n=>`<div class="reset-goal-row"><div class="reset-goal-dot" style="background:linear-gradient(135deg,#A8D8B8,#80C8A0)">${n}</div><input class="reset-input" style="border-bottom-color:#B8E0C0" placeholder="Something I accomplished..." value="${(d[`win${n}`]||"")}" onchange="saveWR('${wk}','win${n}',this.value)"/></div>`).join("")}
      </div>
      <div class="reset-section">
        <div class="reset-sec-lbl" style="color:#508060">💡 What Went Well</div>
        <textarea class="reset-textarea" style="border-color:#B8E0C0;" placeholder="Moments and decisions that worked..." onchange="saveWR('${wk}','well',this.value)">${d.well||""}</textarea>
      </div>
      <div class="reset-section">
        <div class="reset-sec-lbl" style="color:#508060">🔍 What Didn't Go Well</div>
        <textarea class="reset-textarea" style="border-color:#B8E0C0;" placeholder="Challenges or struggles this week..." onchange="saveWR('${wk}','notwell',this.value)">${d.notwell||""}</textarea>
      </div>

        <textarea class="reset-textarea" style="border-color:#B8E0C0;" placeholder="Lessons and insights..." onchange="saveWR('${wk}','learned',this.value)">${d.learned||""}</textarea>

function saveMR(key,field,value){const d=ldo(key);d[field]=value;svo(key,d);}
function saveWR(key,field,value){const d=ldo(key);d[field]=value;svo(key,d);}

// ── HOUSE PROJECTS ────────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
let houseGanttView=3; // months: 3, 6, or 12

function houseProjects(){return lda("house_projects");}
function saveHouseProjects(arr){sva("house_projects",arr);}
function houseUID(){return "hp"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function renderHouse(){
  document.getElementById("accentStrip").style.background="linear-gradient(90deg,#F0C8D0,#D8C8E8,#C8D8E8)";
  const projects=houseProjects();
  const total=projects.length;
  const inProgress=projects.filter(p=>p.status==="In Progress").length;
  const completed=projects.filter(p=>p.status==="Completed").length;
  const planning=projects.filter(p=>p.status==="Planning").length;
  const avgProg=total?Math.round(projects.reduce((s,p)=>s+(p.progress||0),0)/total):0;

  // Status colours mapped to journal palette
  const STATUS_COL={
    "Planning":    {bar:"#B4A8D8",bg:"rgba(180,168,216,.15)",text:"#6858A8"},
    "In Progress": {bar:"#E8A0B8",bg:"rgba(232,160,184,.15)",text:"#C06880"},
    "Completed":   {bar:"#94C8A8",bg:"rgba(148,200,168,.15)",text:"#3A7858"},
    "On Hold":     {bar:"#F0C090",bg:"rgba(240,192,144,.15)",text:"#A07030"},
    "Paused":      {bar:"#9C8C84",bg:"rgba(156,140,132,.15)",text:"#6C5C54"},
  };
  const sc=id=>STATUS_COL[id]||STATUS_COL["Planning"];

  // ── Gantt ────────────────────────────────────────────────────────────────────
  function renderGantt(){
    if(!projects.length) return `<div style="text-align:center;padding:36px 20px;"><span style="font-size:40px;display:block;margin-bottom:12px;">🏠</span><div style="font-family:'Dancing Script',cursive;font-size:18px;color:var(--ink-light);">No projects yet</div><div style="font-size:12px;font-weight:700;color:var(--ink-light);margin-top:4px;">Add your first project above 🌸</div></div>`;
    const today=new Date();
    const viewMonths=houseGanttView;
    const cols=[];
    for(let i=0;i<viewMonths;i++){
      const d=new Date(today.getFullYear(),today.getMonth()+i,1);
      cols.push({label:d.toLocaleDateString("en",{month:"short"})+" '"+String(d.getFullYear()).slice(2)});
    }
    const totalDays=viewMonths*30;
    const startRef=new Date(today.getFullYear(),today.getMonth(),1);
    const colHeaders=cols.map(c=>`<div style="flex:1;text-align:center;font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light);padding:5px 2px;border-right:1px solid #EDE5DD;">${c.label}</div>`).join("");
    const rows=projects.map(p=>{
      const ps=p.start?new Date(p.start):today;
      const pe=p.end?new Date(p.end):new Date(ps.getTime()+30*864e5);
      const offsetPct=Math.min(100,Math.max(0,(ps-startRef)/(864e5)/totalDays*100));
      const widthPct=Math.min(100-offsetPct,Math.max(2,(pe-ps)/(864e5)/totalDays*100));
      const bar=sc(p.status).bar;
      return`<div style="display:flex;align-items:center;border-bottom:1px solid #F0E8EC;min-height:34px;">
        <div style="width:86px;flex-shrink:0;font-size:10px;font-weight:800;color:var(--ink-mid);padding:4px 8px;border-right:1px solid #EDE5DD;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.name}">${p.name}</div>
        <div style="flex:1;position:relative;height:34px;">
          ${cols.map((_,i)=>`<div style="position:absolute;left:${i/viewMonths*100}%;width:${1/viewMonths*100}%;top:0;bottom:0;border-right:1px solid #F8F0F4;"></div>`).join("")}
          <div style="position:absolute;left:${offsetPct}%;width:${widthPct}%;top:50%;transform:translateY(-50%);height:16px;background:${bar};border-radius:8px;display:flex;align-items:center;justify-content:center;min-width:16px;box-shadow:0 2px 6px rgba(0,0,0,.12);">
            ${widthPct>10?`<span style="font-size:8px;font-weight:900;color:white;padding:0 5px;">${p.progress||0}%</span>`:""}
          </div>
        </div>
      </div>`;
    }).join("");
    return`<div style="overflow-x:auto;"><div style="min-width:280px;">
      <div style="display:flex;border-bottom:1.5px solid #EDE5DD;">
        <div style="width:86px;flex-shrink:0;font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-light);padding:5px 8px;border-right:1px solid #EDE5DD;">PROJECT</div>
        <div style="flex:1;display:flex;">${colHeaders}</div>
      </div>
      ${rows}
    </div></div>`;
  }

  const statuses=["Planning","In Progress","Completed","On Hold","Paused"];
  const today=new Date().toISOString().split("T")[0];

  document.getElementById("pageInner").innerHTML=`
    <!-- Page heading -->
    <div style="margin-bottom:14px;">
      <div class="section-heading" style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--rose-deep);">🏠 House Projects</div>
      <div class="section-sub" style="font-size:11px;font-weight:700;color:var(--ink-light);margin-top:2px;">Gantt chart planner · auto-saved</div>
    </div>

    <!-- Stats 2×2 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;">
      ${[
        {label:"Total Projects", val:total,       color:"var(--rose-dark)"},
        {label:"In Progress",    val:inProgress,   color:"var(--lavender)"},
        {label:"Completed",      val:completed,    color:"var(--mint)"},
        {label:"Planning",       val:planning,     color:"var(--gold)"},
      ].map(s=>`
        <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:14px 14px 10px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
          <div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:${s.color};line-height:1;">${s.val}</div>
          <div style="font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);margin-top:6px;">${s.label}</div>
        </div>`).join("")}
    </div>

    <!-- Avg progress full-width card -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:13px 14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);">📊 Average Progress</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--rose-dark);">${avgProg}%</div>
      </div>
      <div style="height:9px;background:#F0E8EC;border-radius:5px;overflow:hidden;">
        <div style="height:100%;width:${avgProg}%;background:linear-gradient(90deg,var(--rose),var(--lavender));border-radius:5px;transition:width .5s;"></div>
      </div>
    </div>

    <!-- Add project form -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-light);margin-bottom:11px;">✦ Add New Project</div>
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px;">
        <span style="font-size:22px;flex-shrink:0;">🏠</span>
        <input id="hp-name" style="flex:1;border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 11px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink);outline:none;background:#FAFAFA;transition:border-color .2s;" placeholder="Project name... (e.g. Kitchen Reno)" onfocus="this.style.borderColor='var(--rose)'" onblur="this.style.borderColor='#EEE0EC'"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px;">
        <div>
          <div style="font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);margin-bottom:4px;">📅 Start Date</div>
          <input id="hp-start" type="date" value="${today}" style="width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:7px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;"/>
        </div>
        <div>
          <div style="font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);margin-bottom:4px;">🏁 End Date</div>
          <input id="hp-end" type="date" style="width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:7px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;"/>
        </div>
      </div>
      <div style="margin-bottom:12px;">
        <div style="font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);margin-bottom:4px;">Status</div>
        <select id="hp-status" style="width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 11px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;cursor:pointer;">
          ${statuses.map(s=>`<option value="${s}">${s}</option>`).join("")}
        </select>
      </div>
      <button onclick="addHouseProject()" style="width:100%;background:linear-gradient(135deg,#F0C8D0,#D0C8E8);border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:900;color:var(--rose-deep);cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 3px 10px rgba(220,140,170,.3);transition:all .18s;">🏠 Add Project</button>
    </div>

    <!-- Project cards -->

function addHouseProject(){
  const name=document.getElementById("hp-name")?.value?.trim();
  if(!name){document.getElementById("hp-name")?.focus();return;}
  const start=document.getElementById("hp-start")?.value||"";
  const end=document.getElementById("hp-end")?.value||"";
  const status=document.getElementById("hp-status")?.value||"Planning";
  const projects=houseProjects();
  projects.push({id:houseUID(),name,start,end,status,progress:0,note:"",created:Date.now()});
  saveHouseProjects(projects);renderHouse();
}
function deleteHouseProject(id){
  if(!confirm("Delete this project?"))return;
  saveHouseProjects(houseProjects().filter(p=>p.id!==id));renderHouse();
}
function updateHouseProgress(id,val){
  const projects=houseProjects();const p=projects.find(p=>p.id===id);
  if(!p)return;p.progress=parseInt(val);
  if(p.progress===100)p.status="Completed";
  else if(p.progress>0&&p.status==="Planning")p.status="In Progress";
  saveHouseProjects(projects);
  // Update UI without full re-render for smooth slider feel
  renderHouse();
}
function updateHouseNote(id,val){
  const projects=houseProjects();const p=projects.find(p=>p.id===id);
  if(!p)return;p.note=val;saveHouseProjects(projects);
}
function editHouseProject(id){
  const projects=houseProjects();const p=projects.find(p=>p.id===id);if(!p)return;
  const name=prompt("Project name:",p.name);if(name===null)return;
  const statuses=["Planning","In Progress","Completed","On Hold","Paused"];
  const si=prompt(`Status (${statuses.join(" / ")}):`,p.status);
  p.name=name.trim()||p.name;
  if(statuses.includes(si))p.status=si;
  saveHouseProjects(projects);renderHouse();
}

}

function addGoal(){
  const title=document.getElementById("g-title")?.value?.trim();
  if(!title){document.getElementById("g-title")?.focus();return;}
  const cat=document.getElementById("g-cat")?.value||"Personal";
  const target=document.getElementById("g-target")?.value||"";
  const note=document.getElementById("g-note")?.value?.trim()||"";
  const all=goals();
  all.unshift({id:gid(),title,cat,target,note,status:"Not Started",progress:0,actions:[],created:Date.now()});
  saveGoals(all);renderGoals();
}
function deleteGoal(id){
  if(!confirm("Delete this goal?"))return;
  saveGoals(goals().filter(g=>g.id!==id));renderGoals();
}
function updateGoalProgress(id,val){
  const all=goals();const g=all.find(g=>g.id===id);if(!g)return;
  g.progress=parseInt(val);
  if(g.progress===100&&g.status!=="Completed")g.status="Completed";
  else if(g.progress>0&&g.status==="Not Started")g.status="In Progress";
  saveGoals(all);renderGoals();
}
function cycleGoalStatus(id){
  const all=goals();const g=all.find(g=>g.id===id);if(!g)return;
  const idx=GOAL_STATUSES.indexOf(g.status);
  g.status=GOAL_STATUSES[(idx+1)%GOAL_STATUSES.length];
  if(g.status==="Completed")g.progress=100;
  saveGoals(all);renderGoals();
}
function addGoalAction(gid){
  const inp=document.getElementById("ai-"+gid);
  const text=inp?.value?.trim();if(!text)return;
  const all=goals();const g=all.find(g=>g.id===gid);if(!g)return;
  if(!g.actions)g.actions=[];
  g.actions.push({id:aid(),text,done:false});
  saveGoals(all);
  inp.value="";
  renderGoals();
  setTimeout(()=>document.getElementById("ai-"+gid)?.focus(),60);
}
function toggleGoalAction(gid,idx){
  const all=goals();const g=all.find(g=>g.id===gid);if(!g||!g.actions)return;
  g.actions[idx].done=!g.actions[idx].done;
  // Auto-update goal progress from action completion
  const pct=Math.round(g.actions.filter(a=>a.done).length/g.actions.length*100);
  g.progress=pct;
  if(pct===100)g.status="Completed";
  else if(pct>0&&g.status==="Not Started")g.status="In Progress";
  saveGoals(all);renderGoals();
}
function deleteGoalAction(gid,idx){
  const all=goals();const g=all.find(g=>g.id===gid);if(!g||!g.actions)return;
  g.actions.splice(idx,1);
  saveGoals(all);renderGoals();
}

      :`<div style="font-size:11px;font-weight:700;color:var(--ink-light);">Set a savings goal to track your progress 🌸</div>`}
    </div>

    <!-- Category breakdown -->
    ${topCats.length?`<div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);margin-bottom:10px;">📊 Top Spending</div>
      ${topCats.map(([cat,amt])=>{
        const pct=expenses>0?Math.round(amt/expenses*100):0;
        const col=BUD_CAT_COL[cat]||"#C8C0B8";
        return`<div style="margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <span style="font-size:11px;font-weight:800;color:var(--ink);">${BUD_CAT_EMOJI[cat]||"💳"} ${cat}</span>
            <span style="font-size:11px;font-weight:900;color:var(--rose-dark);">$${amt.toFixed(2)} <span style="font-size:9px;color:var(--ink-light);">(${pct}%)</span></span>
          </div>
          <div style="height:5px;background:#F0E8EC;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${col};border-radius:3px;"></div></div>
        </div>`;
      }).join("")}
    </div>`:""}

    <!-- Add entry form -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-light);margin-bottom:10px;">✦ Add Entry</div>
      <div style="display:flex;gap:7px;margin-bottom:9px;">
        <button id="bud-type-exp" onclick="setBudType('expense')" style="flex:1;border-radius:10px;padding:8px;font-size:12px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid;transition:all .15s;background:linear-gradient(135deg,#F0C8D0,#E8B0C0);color:var(--rose-deep);border-color:transparent;">💸 Expense</button>
        <button id="bud-type-inc" onclick="setBudType('income')"  style="flex:1;border-radius:10px;padding:8px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid #EEE0EC;background:white;color:var(--ink-light);transition:all .15s;">💵 Income</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:8px;">
        <select id="bud-cat" style="border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;">
          ${BUD_EXP_CATS.map(c=>`<option value="${c}">${BUD_CAT_EMOJI[c]} ${c}</option>`).join("")}
        </select>
        <input id="bud-date" type="date" value="${today}" style="width:130px;border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px;">
        <div>
          <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-bottom:4px;">Amount ($)</div>
          <input id="bud-amt" type="number" placeholder="0.00" step="0.01" style="width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 11px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--ink);background:#FAFAFA;outline:none;" onkeydown="if(event.key==='Enter')addBudEntry()"/>
        </div>
        <div>
          <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-bottom:4px;">Note</div>
          <input id="bud-note" placeholder="e.g. Groceries" style="width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 11px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;" onkeydown="if(event.key==='Enter')addBudEntry()"/>
        </div>
      </div>
      <button onclick="addBudEntry()" style="width:100%;background:linear-gradient(135deg,#F0D890,#D8C060);border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:900;color:#5C4800;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 3px 10px rgba(200,180,80,.3);">💰 Add Entry</button>
    </div>

    <!-- Month nav + entries -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button onclick="budNavMonth(-1)" style="border:1.5px solid #EEE0EC;border-radius:20px;padding:5px 12px;background:white;font-size:11px;font-weight:800;color:var(--ink-light);cursor:pointer;font-family:'Nunito',sans-serif;">◀ Prev</button>
      <div style="font-family:'Dancing Script',cursive;font-size:18px;font-weight:700;color:var(--rose-deep);">${viewLabel}</div>
      <button onclick="budNavMonth(1)" style="border:1.5px solid #EEE0EC;border-radius:20px;padding:5px 12px;background:white;font-size:11px;font-weight:800;color:var(--ink-light);cursor:pointer;font-family:'Nunito',sans-serif;">Next ▶</button>
    </div>

    ${Object.keys(grouped).length===0
      ?`<div style="text-align:center;padding:32px 20px;"><span style="font-size:44px;display:block;margin-bottom:10px;">💰</span><div style="font-family:'Dancing Script',cursive;font-size:18px;color:var(--ink-light);">No entries this month</div></div>`
      :Object.entries(grouped).map(([date,entries])=>{
          const dt=new Date(date+"T12:00:00");
          const lbl=dt.toLocaleDateString("en",{weekday:"short",month:"short",day:"numeric"});
          const dayTotal=entries.reduce((s,e)=>s+(e.etype==="income"?1:-1)*(parseFloat(e.amount)||0),0);
          return`<div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(180,120,160,.06);">
            <div style="background:linear-gradient(135deg,#FFF8EE,#FFF0E8);padding:8px 14px;border-bottom:1px solid #EEE0EC;display:flex;justify-content:space-between;align-items:center;">
              <div style="font-size:11px;font-weight:900;color:var(--peach);">📅 ${lbl}</div>
              <div style="font-size:12px;font-weight:900;color:${dayTotal>=0?"var(--mint)":"var(--rose-dark)"};">${dayTotal>=0?"+":"-"}$${Math.abs(dayTotal).toFixed(2)}</div>
            </div>
            <div style="padding:2px 14px 4px;">${entries.map(e=>entryRow(e)).join("")}</div>
          </div>`;
        }).join("")
    }
  `;
}

let budEntryType="expense";
function setBudType(type){
  budEntryType=type;
  const ec=BUD_EXP_CATS,ic=BUD_INC_CATS;
  const cats=type==="expense"?ec:ic;
  const sel=document.getElementById("bud-cat");
  if(sel)sel.innerHTML=cats.map(c=>`<option value="${c}">${BUD_CAT_EMOJI[c]||"💳"} ${c}</option>`).join("");
  const eb=document.getElementById("bud-type-exp"),ib=document.getElementById("bud-type-inc");
  if(eb)eb.style.cssText=`flex:1;border-radius:10px;padding:8px;font-size:12px;font-weight:${type==="expense"?900:800};cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid;transition:all .15s;background:${type==="expense"?"linear-gradient(135deg,#F0C8D0,#E8B0C0)":"white"};color:${type==="expense"?"var(--rose-deep)":"var(--ink-light)"};border-color:${type==="expense"?"transparent":"#EEE0EC"};`;
  if(ib)ib.style.cssText=`flex:1;border-radius:10px;padding:8px;font-size:12px;font-weight:${type==="income"?900:800};cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid;transition:all .15s;background:${type==="income"?"linear-gradient(135deg,#C8E8C8,#A8D8A8)":"white"};color:${type==="income"?"#3A6838":"var(--ink-light)"};border-color:${type==="income"?"transparent":"#EEE0EC"};`;
}
function addBudEntry(){
  const cat=document.getElementById("bud-cat")?.value||"Other";
  const amt=document.getElementById("bud-amt")?.value;
  if(!amt||parseFloat(amt)<=0){document.getElementById("bud-amt")?.focus();return;}
  const date=document.getElementById("bud-date")?.value||tds();
  const note=document.getElementById("bud-note")?.value?.trim()||"";
  const all=budEntries();
  all.push({id:budUID(),etype:budEntryType,cat,amount:parseFloat(amt),date,note,created:Date.now()});
  saveBud(all);renderBudget();
}
function deleteBudEntry(id){saveBud(budEntries().filter(e=>e.id!==id));renderBudget();}
function budNavMonth(dir){
  const d=new Date(budViewMonth+"-01");d.setMonth(d.getMonth()+dir);
  budViewMonth=d.toISOString().slice(0,7);renderBudget();
}

// ═══════════════════════════════════════════════════════════════════════════════
// ── HABIT TRACKER ─────────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
const HABIT_EMOJIS=["💧","🏃","📚","🧘","😴","🥗","💊","✍️","🙏","💪","🎨","🎵","🌿","🫖","📝","🚿","🌅","🌙","🛏️","🧹"];
const HABIT_COLORS=["#F0A8B8","#A8D8B8","#A8B8D8","#F0C890","#C8A8E0","#90C8D8","#F0A8A8","#A8C8A8","#D8A8D8","#F0C8A8"];

function habitList(){return lda("habits_v1");}
function saveHabits(a){sva("habits_v1",a);}
function huid(){return "h"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function isDone(hid,date){return ld("hd_"+hid+"_"+date)==="1";}
function setDone(hid,date,val){sv("hd_"+hid+"_"+date,val?"1":"0");}
function getStreak(hid){
  let s=0,d=new Date(tds());
  while(isDone(hid,d.toISOString().split("T")[0])){s++;d.setDate(d.getDate()-1);}
  return s;
}

let habitViewMonth=tds().slice(0,7);

function renderHabits(){
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.habits;
  const habits=habitList();
  const today=tds();

  // Build the days for this month view
  const mv=new Date(habitViewMonth+"-01");
  const daysInMonth=new Date(mv.getFullYear(),mv.getMonth()+1,0).getDate();
  const days=Array.from({length:daysInMonth},(_,i)=>{
    const d=new Date(mv.getFullYear(),mv.getMonth(),i+1);
    return d.toISOString().split("T")[0];
  });
  const todayCompletions=habits.filter(h=>isDone(h.id,today)).length;
  const viewLabel=mv.toLocaleDateString("en",{month:"long",year:"numeric"});

  function habitRow(h){
    const streak=getStreak(h.id);
    const monthDone=days.filter(d=>isDone(h.id,d)).length;
    const pct=Math.round(monthDone/days.length*100);

    // Build Mon–Sun week containing today (local date, no timezone shift)
    const localNow=new Date();
    const localToday=`${localNow.getFullYear()}-${String(localNow.getMonth()+1).padStart(2,"0")}-${String(localNow.getDate()).padStart(2,"0")}`;
    const DAY_LABELS=["M","T","W","T","F","S","S"]; // Mon=0 … Sun=6
    const dow=localNow.getDay(); // 0=Sun,1=Mon,...6=Sat
    const mondayOffset=dow===0?-6:1-dow; // days back to Monday
    const weekDays=Array.from({length:7},(_,i)=>{
      const d=new Date(localNow);
      d.setDate(localNow.getDate()+mondayOffset+i);
      return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    });
    const dots=weekDays.map((d,i)=>{
      const done=isDone(h.id,d);
      const isToday=d===localToday;
      const isFuture=d>localToday;
      return`<div onclick="${isFuture?"":"toggleHabit('"+h.id+"','"+d+"')"}" style="width:32px;height:32px;border-radius:50%;background:${done?h.color||"#F0A8B8":isToday?"#F8F0F8":"#F0E8EC"};border:${isToday?"2.5px solid "+(h.color||"var(--rose-dark)"):"2px solid transparent"};cursor:${isFuture?"default":"pointer"};display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .18s;opacity:${isFuture?0.35:1};" title="${d}">${done?"✓":""}</div>`;
    }).join("");
    const labels=DAY_LABELS.map((lbl,i)=>`<div style="width:32px;text-align:center;font-size:9px;font-weight:900;letter-spacing:.04em;color:${weekDays[i]===localToday?h.color||"var(--rose-dark)":"var(--ink-light)"};">${lbl}</div>`).join("");

    return`<div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;padding:13px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div style="width:40px;height:40px;border-radius:13px;background:${h.color||"#F0A8B8"}28;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">${h.emoji||"✦"}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:800;color:var(--ink);margin-bottom:3px;">${h.name}</div>
          <div style="display:flex;gap:6px;align-items:center;">
            ${streak>0?`<span style="background:${h.color||"#F0A8B8"}22;color:var(--rose-dark);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;">🔥 ${streak}d streak</span>`:""}
            <span style="font-size:10px;font-weight:700;color:var(--ink-light);">${monthDone}/${days.length} days · ${pct}%</span>
          </div>
        </div>
        <button onclick="deleteHabit('${h.id}')" style="background:none;border:none;color:#D8C0C8;cursor:pointer;font-size:13px;flex-shrink:0;">🗑️</button>
      </div>
      <!-- Month progress bar -->
      <div style="height:5px;background:#F0E8EC;border-radius:3px;overflow:hidden;margin-bottom:10px;">
        <div style="height:100%;width:${pct}%;background:${h.color||"#F0A8B8"};border-radius:3px;transition:width .4s;"></div>
      </div>
      <!-- This week Mon–Sun -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">${dots}</div>
      <div style="display:flex;justify-content:space-between;">${labels}</div>
    </div>`;
  }

  document.getElementById("pageInner").innerHTML=`
    <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--rose-deep);margin-bottom:2px;">🌱 Habit Tracker</div>
    <div style="font-size:11px;font-weight:700;color:var(--ink-light);margin-bottom:14px;">Small steps every day 🌸</div>

    <!-- Today's stats -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
      <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 2px 8px rgba(180,120,160,.06);">
        <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--rose-dark);">${habits.length}</div>
        <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-top:4px;">Habits</div>
      </div>
      <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 2px 8px rgba(180,120,160,.06);">
        <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--mint);">${todayCompletions}</div>
        <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-top:4px;">Done Today</div>
      </div>
      <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 2px 8px rgba(180,120,160,.06);">
        <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--lavender);">${habits.length>0?Math.round(todayCompletions/habits.length*100):0}%</div>
        <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-top:4px;">Today's Rate</div>
      </div>
    </div>

    <!-- Today quick check -->
    ${habits.length>0?`<div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;padding:13px 14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-light);margin-bottom:10px;">☀️ Today — ${new Date().toLocaleDateString("en",{weekday:"long",month:"long",day:"numeric"})}</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${habits.map(h=>{
          const localNow2=new Date();
          const localTodayKey=`${localNow2.getFullYear()}-${String(localNow2.getMonth()+1).padStart(2,"0")}-${String(localNow2.getDate()).padStart(2,"0")}`;
          const done=isDone(h.id,localTodayKey);
          return`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;background:${done?h.color+"18":"#FAFAFA"};border:1.5px solid ${done?h.color+"44":"#EEE0EC"};cursor:pointer;transition:all .18s;" onclick="toggleHabit('${h.id}','${`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`}')">
            <div style="width:26px;height:26px;border-radius:50%;background:${done?h.color:"white"};border:2.5px solid ${done?h.color:"#D8C0D8"};display:flex;align-items:center;justify-content:center;font-size:12px;color:white;flex-shrink:0;transition:all .18s;">${done?"✓":""}</div>
            <span style="font-size:18px;flex-shrink:0;">${h.emoji||"✦"}</span>
            <div style="flex:1;font-size:13px;font-weight:${done?700:800};color:${done?"var(--ink-light)":"var(--ink)"};${done?"text-decoration:line-through;":""}">${h.name}</div>
            ${getStreak(h.id)>0?`<span style="font-size:10px;font-weight:800;color:var(--rose-dark);">🔥 ${getStreak(h.id)}</span>`:""}
          </div>`;
        }).join("")}
      </div>
    </div>`:""}

    <!-- Add habit form -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-light);margin-bottom:11px;">✦ Add New Habit</div>
      <input id="h-name" style="width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink);outline:none;background:#FAFAFA;margin-bottom:9px;" placeholder="e.g. Drink 8 glasses of water" onkeydown="if(event.key==='Enter')addHabit()"/>
      <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-bottom:6px;">Choose Emoji</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px;" id="h-emoji-row">
        ${HABIT_EMOJIS.map((em,i)=>`<button onclick="selectHabitEmoji('${em}',this)" class="${i===0?"h-em-sel":""}" style="width:36px;height:36px;border-radius:10px;border:2px solid ${i===0?"var(--rose)":"#EEE0EC"};background:${i===0?"var(--blush)":"white"};font-size:20px;cursor:pointer;transition:all .15s;">${em}</button>`).join("")}
      </div>
      <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-bottom:6px;">Colour</div>
      <div style="display:flex;gap:7px;margin-bottom:11px;" id="h-color-row">
        ${HABIT_COLORS.map((col,i)=>`<div onclick="selectHabitColor('${col}',this)" style="width:26px;height:26px;border-radius:50%;background:${col};cursor:pointer;border:3px solid ${i===0?"var(--ink)":"transparent"};transform:${i===0?"scale(1.2)":"scale(1)"};transition:all .15s;"></div>`).join("")}
      </div>
      <button onclick="addHabit()" style="width:100%;background:linear-gradient(135deg,#C8D8F0,#A8C0E8);border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:900;color:#384878;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 3px 10px rgba(140,160,200,.3);">🌱 Add Habit</button>
    </div>

    <!-- Habit cards -->
    ${habits.length===0
      ?`<div style="text-align:center;padding:32px 20px;"><span style="font-size:44px;display:block;margin-bottom:10px;">🌱</span><div style="font-family:'Dancing Script',cursive;font-size:18px;color:var(--ink-light);">No habits yet</div><div style="font-size:12px;font-weight:700;color:var(--ink-light);margin-top:6px;">Add your first habit above 🌸</div></div>`
      :habits.map(h=>habitRow(h)).join("")}
  `;
}

let selHabitEmoji=HABIT_EMOJIS[0], selHabitColor=HABIT_COLORS[0];
function selectHabitEmoji(em,btn){
  selHabitEmoji=em;
  document.querySelectorAll("#h-emoji-row button").forEach(b=>{b.style.border="2px solid #EEE0EC";b.style.background="white";});
  btn.style.border="2px solid var(--rose)";btn.style.background="var(--blush)";
}
function selectHabitColor(col,el){
  selHabitColor=col;
  document.querySelectorAll("#h-color-row div").forEach(d=>{d.style.border="3px solid transparent";d.style.transform="scale(1)";});
  el.style.border="3px solid var(--ink)";el.style.transform="scale(1.2)";
}
function addHabit(){
  const name=document.getElementById("h-name")?.value?.trim();
  if(!name){document.getElementById("h-name")?.focus();return;}
  const habits=habitList();
  habits.push({id:huid(),name,emoji:selHabitEmoji,color:selHabitColor,created:Date.now()});
  saveHabits(habits);renderHabits();
}
function deleteHabit(id){
  if(!confirm("Delete this habit?"))return;
  saveHabits(habitList().filter(h=>h.id!==id));renderHabits();
}
function toggleHabit(hid,date){

}

// ═══════════════════════════════════════════════════════════════════════════════
// ── WEEKLY PRE-PLANNING PAGE ──────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
let weekPlanOffset=0;

function getWeekPlanDays(offset){
  const now=new Date();
  const dow=now.getDay();
  const sun=new Date(now); sun.setDate(now.getDate()-dow+offset*7);
  return Array.from({length:7},(_,i)=>{
    const d=new Date(sun); d.setDate(sun.getDate()+i);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const ns=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
    return{date:ds,dayName:["SUN","MON","TUE","WED","THU","FRI","SAT"][i],dayNum:d.getDate(),
      monthShort:d.toLocaleDateString("en",{month:"short"}),isToday:ds===ns,isPast:ds<ns,dow:i};
  });
}

function saveTBWeek(date,h,val){
  let d={};try{d=JSON.parse(ld("wtb_"+date,"{}"));}catch(e){}
  d[String(h)]=val; sv("wtb_"+date,JSON.stringify(d));
}
function getTBWeek(date){try{return JSON.parse(ld("wtb_"+date,"{}"));}catch(e){return{};}}

function toggleWPTask(date,n,el){
  const key="wpp_td"+n+"_"+date;
  const now=ld(key,"0")!=="1";
  sv(key,now?"1":"0");
  el.style.background=now?"linear-gradient(135deg,#C8EED8,#A8DCC0)":"white";
  el.style.borderColor=now?"#88C8A8":"#D8C0C8";
  el.textContent=now?"✓":"";
  const inp=document.getElementById("wpp_t"+n+"_"+date);
  if(inp){inp.style.textDecoration=now?"line-through":"none";inp.style.color=now?"var(--ink-light)":"var(--ink)";}
}

function renderWeeklyPlan(){
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.weekly_plan;
  const days=getWeekPlanDays(weekPlanOffset);
  const sun=days[0], sat=days[6];
  const fmt=d=>new Date(d.date+"T12:00:00").toLocaleDateString("en",{month:"short",day:"numeric"});
  const rangeLabel=`${fmt(sun)} – ${fmt(sat)}, ${new Date(sat.date+"T12:00:00").getFullYear()}`;
  const wkKey=sun.date;
  const wpIntention=ld("wp_int_"+wkKey);
  const wpFocus    =ld("wp_focus_"+wkKey);
  const eventsAll  =calEvents();

  // Journal day card colours — match the existing weekly planner palette
  const DAY_COLS=["#D0A0A8","#7088C8","#88A0C8","#90A8B8","#98B0A8","#A0A898","#C898A8"];
  // AM/PM/EVE colours from journal palette
  const AM_COL ="#C8A848"; // gold
  const PM_COL ="#94C8A8"; // mint
  const EVE_COL="#B4A8D8"; // lavender

  const AM_SLOTS =[{h:8,l:"8am"},{h:9,l:"9am"},{h:10,l:"10am"},{h:11,l:"11am"},{h:12,l:"12pm"}];
  const PM_SLOTS =[{h:13,l:"1pm"},{h:14,l:"2pm"},{h:15,l:"3pm"},{h:16,l:"4pm"},{h:17,l:"5pm"},{h:18,l:"6pm"}];
  const EVE_SLOTS=[{h:19,l:"7pm"},{h:20,l:"8pm"},{h:21,l:"9pm"},{h:22,l:"10pm"},{h:23,l:"11pm"},{h:0,l:"12am"}];

  function slotRow(date,s,borderCol){
    const tb=getTBWeek(date);
    const val=(tb[String(s.h)]||"").replace(/</g,"&lt;");
    return`<div style="display:flex;align-items:center;min-height:28px;border-bottom:1px solid #F5EEF0;">
      <div style="width:40px;flex-shrink:0;text-align:right;padding-right:6px;font-size:10px;font-weight:700;color:var(--ink-light);">${s.l}</div>
      <div style="width:2.5px;min-height:28px;background:${borderCol};flex-shrink:0;opacity:.7;border-radius:2px;"></div>
      <input value="${val}" placeholder="..." style="flex:1;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;color:var(--ink);outline:none;padding:0 8px;height:28px;caret-color:var(--rose-dark);" onchange="saveTBWeek('${date}',${s.h},this.value)"/>
    </div>`;
  }

  function dayCard(day,di){
    const col=DAY_COLS[di];
    const dayEvs=eventsAll.filter(e=>e.date===day.date);
    const focus=ld("wpp_focus_"+day.date);
    const win  =ld("wpp_win_"+day.date);
    const tasks=[1,2,3,4].map(n=>({n,txt:ld("wpp_t"+n+"_"+day.date),done:ld("wpp_td"+n+"_"+day.date)==="1"}));

    return`<div style="background:white;border:${day.isToday?`2px solid ${col}`:"1.5px solid #EEE0EC"};border-radius:18px;overflow:hidden;box-shadow:${day.isToday?`0 4px 18px ${col}44`:"0 2px 10px rgba(180,120,160,.07)"};">

      <!-- Day header - coloured top strip -->
      <div style="background:${col};padding:10px 13px 9px;">
        <div style="font-size:9px;font-weight:900;letter-spacing:.18em;color:rgba(255,255,255,.8);margin-bottom:1px;">${day.dayName}</div>
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:white;line-height:1;">${day.dayNum}<span style="font-size:11px;font-weight:700;margin-left:4px;opacity:.75;">${day.monthShort}</span></div>
        ${day.isToday?`<div style="font-size:9px;font-weight:800;color:rgba(255,255,255,.7);margin-top:2px;">🌸 Today</div>`:""}
      </div>

      <!-- Events (if any) -->
      ${dayEvs.length?`<div style="padding:5px 10px 4px;background:#FFF8FA;border-bottom:1px solid #F5EEF0;">
        ${dayEvs.slice(0,3).map(e=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;">
          <div style="width:5px;height:5px;border-radius:50%;background:${e.color||"#E8A0A8"};flex-shrink:0;"></div>
          <span style="font-size:10px;font-weight:700;color:var(--ink-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.title}${e.time?" · "+e.time:""}</span>
        </div>`).join("")}
      </div>`:""}

      <!-- Focus -->
      <div style="padding:9px 13px 8px;border-bottom:1px solid #F5EEF0;background:var(--cream);">
        <div style="font-size:8px;font-weight:900;letter-spacing:.16em;color:var(--gold);display:flex;align-items:center;gap:4px;margin-bottom:5px;">⭐ FOCUS</div>
        <input value="${focus.replace(/"/g,"&quot;")}" placeholder="Main task..." style="width:100%;border:none;border-bottom:1.5px solid var(--rose);background:transparent;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);outline:none;padding:2px 0 3px;caret-color:var(--rose-dark);" onchange="sv('wpp_focus_${day.date}',this.value)"/>
      </div>

      <!-- Tasks -->
      <div style="padding:8px 13px 6px;border-bottom:1px solid #F5EEF0;">
        <div style="font-size:8px;font-weight:900;letter-spacing:.16em;color:var(--ink-light);margin-bottom:6px;">TASKS</div>
        ${tasks.map(t=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;border-bottom:1px solid #F5EEF0;padding-bottom:5px;">
          <div onclick="toggleWPTask('${day.date}',${t.n},this)" style="width:17px;height:17px;border-radius:50%;border:1.5px solid ${t.done?"#88C8A8":"#D8C0C8"};background:${t.done?"linear-gradient(135deg,#C8EED8,#A8DCC0)":"white"};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:white;transition:all .15s;">${t.done?"✓":""}</div>
          <input id="wpp_t${t.n}_${day.date}" value="${t.txt.replace(/"/g,"&quot;")}" placeholder="Task ${t.n}…" style="flex:1;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:${t.done?"var(--ink-light)":"var(--ink)"};${t.done?"text-decoration:line-through;":""}outline:none;caret-color:var(--rose-dark);" onchange="sv('wpp_t${t.n}_${day.date}',this.value)"/>
        </div>`).join("")}
      </div>

      <!-- AM -->
      <div>
        <div style="padding:6px 13px 4px;display:flex;align-items:center;gap:5px;border-bottom:1px solid #F5EEF0;">
          <span style="font-size:12px;">☀️</span><span style="font-size:8px;font-weight:900;letter-spacing:.16em;color:${AM_COL};">AM</span>
        </div>
        ${AM_SLOTS.map(s=>slotRow(day.date,s,AM_COL)).join("")}
      </div>

      <!-- PM -->
      <div>
        <div style="padding:6px 13px 4px;display:flex;align-items:center;gap:5px;border-bottom:1px solid #F5EEF0;">
          <span style="font-size:12px;">🌤️</span><span style="font-size:8px;font-weight:900;letter-spacing:.16em;color:${PM_COL};">PM</span>
        </div>
        ${PM_SLOTS.map(s=>slotRow(day.date,s,PM_COL)).join("")}
      </div>

      <!-- EVE -->
      <div>
        <div style="padding:6px 13px 4px;display:flex;align-items:center;gap:5px;border-bottom:1px solid #F5EEF0;">
          <span style="font-size:12px;">🌙</span><span style="font-size:8px;font-weight:900;letter-spacing:.16em;color:${EVE_COL};">EVE</span>
        </div>
        ${EVE_SLOTS.map(s=>slotRow(day.date,s,EVE_COL)).join("")}
      </div>

      <!-- Win -->
      <div style="margin:9px 10px 10px;background:var(--gold-pale);border:1px solid var(--gold-light);border-radius:10px;padding:8px 11px;">
        <div style="font-size:8px;font-weight:900;letter-spacing:.14em;color:var(--gold);display:flex;align-items:center;gap:4px;margin-bottom:4px;">🏆 WIN</div>
        <textarea placeholder="Today's win…" style="width:100%;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:11px;font-style:italic;color:var(--ink-mid);outline:none;resize:none;min-height:42px;line-height:1.6;" onchange="sv('wpp_win_${day.date}',this.value)">${win}</textarea>
      </div>
    </div>`;
  }

  document.getElementById("pageInner").innerHTML=`
    <!-- Page heading — journal style -->
    <div class="section-heading">📋 Weekly Pre-Planning</div>
    <div class="section-sub">plan with intention · live with purpose</div>
    <div class="divider"></div>

    <!-- Nav row — journal nav-btn style -->
    <div class="nav-row" style="margin-bottom:12px;">
      <button class="nav-btn" onclick="weekPlanOffset--;renderWeeklyPlan()">◀ Prev Week</button>
      <button class="nav-btn" onclick="weekPlanOffset=0;renderWeeklyPlan()" style="background:var(--blush);color:var(--rose-deep);border-color:var(--rose);font-weight:900;">This Week</button>
      <button class="nav-btn" onclick="weekPlanOffset++;renderWeeklyPlan()">Next Week ▶</button>
    </div>
    <div style="text-align:center;font-family:'Dancing Script',cursive;font-size:17px;font-weight:700;color:var(--rose-deep);margin-bottom:14px;">${rangeLabel}</div>

    <!-- Week intention row -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <div class="sec-label" style="margin-bottom:5px;">🌿 Week Intention</div>
          <textarea class="box-textarea" style="min-height:46px;" placeholder="My focus this week…" onchange="sv('wp_int_${wkKey}',this.value)">${wpIntention}</textarea>
        </div>
        <div>
          <div class="sec-label" style="margin-bottom:5px;">✦ One Big Goal</div>
          <textarea class="box-textarea" style="min-height:46px;" placeholder="Most important this week…" onchange="sv('wp_focus_${wkKey}',this.value)">${wpFocus}</textarea>
        </div>
      </div>
    </div>

    <!-- 2-column day cards -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${days.map((d,i)=>dayCard(d,i)).join("")}
    </div>
  `;
}

// ── SHOPPING LIST ─────────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
const SL_CATS=[
  {name:"🥦 Produce",    key:"produce",   col:"#94C8A8", bg:"rgba(148,200,168,.12)"},
  {name:"🥛 Dairy",      key:"dairy",     col:"#90B8D8", bg:"rgba(144,184,216,.12)"},
  {name:"🥩 Meat",       key:"meat",      col:"#E8A0A8", bg:"rgba(232,160,168,.12)"},

  {name:"🧊 Frozen",     key:"frozen",    col:"#B4A8D8", bg:"rgba(180,168,216,.12)"},
  {name:"🥫 Pantry",     key:"pantry",    col:"#C8A848", bg:"rgba(200,168,72,.12)"},
  {name:"🧃 Beverages",  key:"beverages", col:"#8CB8D8", bg:"rgba(140,184,216,.12)"},

  {name:"✦ Other",       key:"other",     col:"#C8B4A8", bg:"rgba(200,180,168,.12)"},
];
const SL_CAT_KEYS=SL_CATS.map(c=>c.key);
const SL_CAT_BY_KEY=Object.fromEntries(SL_CATS.map(c=>[c.key,c]));

// Multiple named lists
function slLists(){try{return JSON.parse(ld("sl_lists",'[{"id":"main","name":"Groceries"}]'));}catch(e){return[{id:"main",name:"Groceries"}];}}
function saveSLLists(a){sv("sl_lists",JSON.stringify(a));}
function slItems(listId){try{return JSON.parse(ld("sl_items_"+listId,"[]"));}catch(e){return[];}}
function saveSLItems(listId,a){sv("sl_items_"+listId,JSON.stringify(a));}
function slUID(){return "sl"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

let curSlList="main", slCatFilter="all";

function renderShopping(){
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.shopping;
  const lists=slLists();
  const curListObj=lists.find(l=>l.id===curSlList)||lists[0];
  if(!curListObj){curSlList="main";return renderShopping();}
  const items=slItems(curSlList);
  const total=items.length;
  const done=items.filter(i=>i.done).length;
  const pending=total-done;
  const pct=total?Math.round(done/total*100):0;

  // Group by category — only non-done items (or all if showing all)
  const pendingItems=items.filter(i=>!i.done);
  const doneItems=items.filter(i=>i.done);

  // Category filter
  const filtered=slCatFilter==="all"?pendingItems:pendingItems.filter(i=>i.cat===slCatFilter);

  // Group pending by category
  const grouped={};
  filtered.forEach(item=>{(grouped[item.cat]=grouped[item.cat]||[]).push(item);});

  function itemRow(item){
    const cat=SL_CAT_BY_KEY[item.cat]||SL_CAT_BY_KEY.other;
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(220,200,220,.12);transition:background .15s;" ${item.done?`style="opacity:.5;"`:""}  >
      <div onclick="toggleSlItem('${item.id}')" style="width:24px;height:24px;border-radius:50%;border:2px solid ${item.done?"transparent":"#D8C0C8"};background:${item.done?"linear-gradient(135deg,#C8EED8,#A8DCC0)":"white"};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:white;transition:all .18s;">${item.done?"✓":""}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:${item.done?600:800};color:${item.done?"var(--ink-light)":"var(--ink)"};${item.done?"text-decoration:line-through;":""}line-height:1.3;">${item.text}</div>
        <div style="display:flex;gap:5px;align-items:center;margin-top:3px;">
          <span style="font-size:10px;font-weight:800;background:${cat.bg};color:${cat.col};border-radius:20px;padding:1px 8px;">${cat.name}</span>
          ${item.qty?`<span style="font-size:10px;font-weight:700;color:var(--ink-light);">× ${item.qty}</span>`:""}
          ${item.note?`<span style="font-size:10px;font-weight:600;color:var(--ink-light);">· ${item.note}</span>`:""}
        </div>
      </div>
      <button onclick="deleteSlItem('${item.id}')" style="background:none;border:none;color:#D8C0C8;cursor:pointer;font-size:14px;padding:0;flex-shrink:0;line-height:1;" onmouseover="this.style.color='var(--rose-dark)'" onmouseout="this.style.color='#D8C0C8'">✕</button>
    </div>`;
  }

  // Build category groups html
  let groupsHtml="";
  if(filtered.length===0&&slCatFilter==="all"&&pendingItems.length===0){
    groupsHtml=`<div style="text-align:center;padding:28px 16px;"><span style="font-size:40px;display:block;margin-bottom:10px;">🛒</span><div style="font-family:'Dancing Script',cursive;font-size:18px;color:var(--ink-light);">${total>0?"All done! 🎉":"Your list is empty"}</div><div style="font-size:12px;font-weight:700;color:var(--ink-light);margin-top:5px;">${total>0?"Tap ✓ Clear Done to reset":"Add your first item above 🌸"}</div></div>`;
  } else if(filtered.length===0){
    groupsHtml=`<div style="text-align:center;padding:24px;color:var(--ink-light);font-size:13px;font-weight:700;">No items in this category</div>`;
  } else {
    // Show items grouped by category
    const catsPresent=SL_CATS.filter(c=>grouped[c.key]?.length);
    groupsHtml=catsPresent.map(cat=>`
      <div style="margin-bottom:4px;">
        <div style="padding:7px 14px 4px;background:${cat.bg};border-bottom:1px solid rgba(220,200,220,.15);">
          <span style="font-size:10px;font-weight:900;letter-spacing:.12em;color:${cat.col};">${cat.name}</span>
          <span style="font-size:10px;font-weight:700;color:${cat.col};margin-left:6px;opacity:.7;">(${grouped[cat.key].length})</span>
        </div>
        ${grouped[cat.key].map(item=>itemRow(item)).join("")}
      </div>`).join("");
  }

  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">🛒 Shopping List</div>
    <div class="section-sub">never forget a thing 🌸</div>
    <div class="divider"></div>

    <!-- List tabs -->
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      ${lists.map(l=>`<button onclick="curSlList='${l.id}';slCatFilter='all';renderShopping()" style="border-radius:20px;padding:5px 14px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid;transition:all .15s;${curSlList===l.id?"background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:white;border-color:transparent;box-shadow:0 2px 8px rgba(220,130,160,.3);":"background:white;color:var(--ink-light);border-color:#EEE0EC;"}">${l.name}</button>`).join("")}
      <button onclick="addSlList()" style="border-radius:20px;padding:5px 12px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px dashed rgba(220,160,180,.5);background:var(--rose-s,#FFF5F8);color:var(--rose-dark);transition:all .15s;">+ New List</button>
      ${lists.length>1?`<button onclick="deleteSlList('${curSlList}')" style="border-radius:20px;padding:5px 10px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid #EEE0EC;background:white;color:var(--ink-light);margin-left:auto;">🗑️</button>`:""}
    </div>

    <!-- Progress bar -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:12px 14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
        <div style="display:flex;gap:10px;align-items:center;">
          <span style="font-size:13px;font-weight:900;color:var(--rose-dark);">${pending} left</span>
          <span style="font-size:11px;font-weight:700;color:var(--ink-light);">·  ${done} done</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span style="font-size:11px;font-weight:900;color:var(--mint);">${pct}%</span>
