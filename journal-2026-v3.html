    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;">
      <button onclick="slCatFilter='all';renderShopping()" style="border-radius:20px;padding:4px 12px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid;transition:all .15s;${slCatFilter==="all"?"background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:white;border-color:transparent;":"background:white;color:var(--ink-light);border-color:#EEE0EC;}"}">🛒 All (${pendingItems.length})</button>
      ${SL_CATS.filter(c=>(grouped[c.key]||[]).length>0||slCatFilter===c.key).map(c=>`<button onclick="slCatFilter='${c.key}';renderShopping()" style="border-radius:20px;padding:4px 12px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid;transition:all .15s;${slCatFilter===c.key?`background:${c.col};color:white;border-color:transparent;`:`background:${c.bg};color:${c.col};border-color:transparent;`}">${c.name} ${grouped[c.key]?.length?`(${grouped[c.key].length})`:""}</button>`).join("")}
    </div>

    <!-- Items list -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      ${groupsHtml}
    </div>

    <!-- Done items (collapsed) -->
    ${doneItems.length?`<div style="margin-top:12px;">
      <details style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(180,120,160,.06);">
        <summary style="padding:11px 14px;font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-light);cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;">
          <span>✓ Done (${doneItems.length})</span>
          <span style="font-size:12px;color:var(--ink-light);">▾</span>
        </summary>
        <div style="border-top:1px solid #F0E8EC;opacity:.6;">
          ${doneItems.map(item=>itemRow(item)).join("")}
        </div>
      </details>
    </div>`:""}
  `;
}

function addSlItem(){
  const text=document.getElementById("sl-text")?.value?.trim();
  if(!text)return;
  const cat=document.getElementById("sl-cat")?.value||"other";
  const qty=document.getElementById("sl-qty")?.value?.trim()||"";
  const note=document.getElementById("sl-note")?.value?.trim()||"";
  const items=slItems(curSlList);
  items.unshift({id:slUID(),text,cat,qty,note,done:false,added:Date.now()});
  saveSLItems(curSlList,items);
  renderShopping();
  // Keep focus on input for rapid adding
  setTimeout(()=>{
    const el=document.getElementById("sl-text");
    if(el){el.value="";el.focus();}
    const qel=document.getElementById("sl-qty");if(qel)qel.value="";
    const nel=document.getElementById("sl-note");if(nel)nel.value="";
  },30);
}
function toggleSlItem(id){
  const items=slItems(curSlList);
  const item=items.find(i=>i.id===id);
  if(item)item.done=!item.done;
  saveSLItems(curSlList,items);renderShopping();
}
function deleteSlItem(id){
  saveSLItems(curSlList,slItems(curSlList).filter(i=>i.id!==id));renderShopping();
}
function clearDoneSlItems(){
  saveSLItems(curSlList,slItems(curSlList).filter(i=>!i.done));renderShopping();
}
function addSlList(){
  const name=prompt("List name (e.g. Costco, Pharmacy):");
  if(!name?.trim())return;
  const lists=slLists();
  const newId="sl"+Date.now().toString(36);
  lists.push({id:newId,name:name.trim()});
  saveSLLists(lists);curSlList=newId;renderShopping();
}
function deleteSlList(id){
  if(id==="main"){alert("Can't delete the main list.");return;}
  if(!confirm("Delete this list and all its items?"))return;
  const lists=slLists().filter(l=>l.id!==id);
  saveSLLists(lists);sv("sl_items_"+id,"[]");
  curSlList=lists[0]?.id||"main";renderShopping();
}

  {key:"faith",    name:"Faith",      emoji:"🙏", col:"#F0C090", bg:"rgba(240,192,144,.12)"},
  {key:"health",   name:"Health",     emoji:"💚", col:"#94C8A8", bg:"rgba(148,200,168,.12)"},

  {key:"other",    name:"Other",      emoji:"✦",  col:"#9C8C84", bg:"rgba(156,140,132,.10)"},
];
const LC=Object.fromEntries(LINK_CATS.map(c=>[c.key,c]));

function linksList(){return lda("links_v1");}
function saveLinks(a){sva("links_v1",a);}
function linkUID(){return "lk"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

let linkCatFilter="all", linkSearch="", linkSortPinned=true;

function cleanURL(u){
  if(!u)return"";
  u=u.trim();
  if(!/^https?:\/\//i.test(u))u="https://"+u;
  return u;
}
function displayURL(u){
  try{const p=new URL(u);return p.hostname.replace(/^www\./,"");}catch(e){return u.replace(/^https?:\/\//,"").split("/")[0];}
}
function faviconURL(u){
  try{const p=new URL(u);return`https://www.google.com/s2/favicons?domain=${p.hostname}&sz=32`;}catch(e){return"";}
}

function renderLinks(){
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.links;
  const all=linksList();
  const pinned=all.filter(l=>l.pinned);
  const total=all.length;

  let filtered=all;
  if(linkCatFilter!=="all")filtered=filtered.filter(l=>l.cat===linkCatFilter);
  if(linkSearch.trim())filtered=filtered.filter(l=>(l.title+l.url+l.note).toLowerCase().includes(linkSearch.toLowerCase()));

  // Sort: pinned first if flag set
  if(linkSortPinned)filtered=[...filtered.filter(l=>l.pinned),...filtered.filter(l=>!l.pinned)];

  // Group by category
  const grouped={};
  filtered.forEach(l=>{(grouped[l.cat]=grouped[l.cat]||[]).push(l);});

  function linkCard(l){
    const cat=LC[l.cat]||LC.other;
    const url=cleanURL(l.url);
    const favicon=faviconURL(url);
    return`<div style="display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border-bottom:1px solid rgba(220,200,220,.12);transition:background .12s;" onmouseover="this.style.background='#FDF8FC'" onmouseout="this.style.background='transparent'">

      <div style="width:36px;height:36px;border-radius:10px;background:${cat.bg};border:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">

      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:2px;">

          ${l.pinned?`<span style="font-size:11px;flex-shrink:0;">📌</span>`:""}
        </div>
        <div style="font-size:11px;font-weight:700;color:${cat.col};margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${displayURL(url)}</div>

      </div>
      <!-- Actions -->
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
        <a href="${url}" target="_blank" rel="noopener" style="width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--rose),var(--rose-dark));display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:14px;box-shadow:0 2px 6px rgba(220,130,160,.3);" title="Open link">↗</a>
        <button onclick="copyLink('${url}')" style="width:30px;height:30px;border-radius:10px;border:1.5px solid #EEE0EC;background:white;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;" title="Copy URL">📋</button>
        <button onclick="togglePinLink('${l.id}')" style="width:30px;height:30px;border-radius:10px;border:1.5px solid #EEE0EC;background:${l.pinned?"var(--blush)":"white"};cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;" title="${l.pinned?"Unpin":"Pin"}">📌</button>
        <button onclick="deleteLink('${l.id}')" style="width:30px;height:30px;border-radius:10px;border:1.5px solid #EEE0EC;background:white;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;" title="Delete" onmouseover="this.style.background='#FFF0F0'" onmouseout="this.style.background='white'">🗑️</button>
      </div>
    </div>`;
  }

  // Grouped display
  let listHtml="";
  if(filtered.length===0){
    listHtml=`<div style="text-align:center;padding:36px 20px;"><span style="font-size:44px;display:block;margin-bottom:12px;">🔗</span><div style="font-family:'Dancing Script',cursive;font-size:18px;color:var(--ink-light);">${total>0?"No links match":"No links saved yet"}</div><div style="font-size:12px;font-weight:700;color:var(--ink-light);margin-top:5px;">Add your first link above 🌸</div></div>`;
  } else if(linkCatFilter!=="all"||linkSearch){
    // Flat list when filtered
    listHtml=filtered.map(l=>linkCard(l)).join("");
  } else {
    // Grouped by category when showing all
    const catsPresent=LINK_CATS.filter(c=>c.key!=="all"&&grouped[c.key]?.length);
    if(pinned.length&&linkSortPinned){
      listHtml+=`<div style="padding:7px 14px 4px;background:rgba(240,220,200,.15);border-bottom:1px solid rgba(220,200,220,.15);"><span style="font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);">📌 Pinned</span></div>`;
      listHtml+=pinned.map(l=>linkCard(l)).join("");
      const unpinnedCats=LINK_CATS.filter(c=>c.key!=="all"&&(grouped[c.key]||[]).some(l=>!l.pinned));
      unpinnedCats.forEach(cat=>{
        const items=(grouped[cat.key]||[]).filter(l=>!l.pinned);
        if(!items.length)return;
        listHtml+=`<div style="padding:7px 14px 4px;background:${cat.bg};border-bottom:1px solid rgba(220,200,220,.12);border-top:1px solid rgba(220,200,220,.12);"><span style="font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:${cat.col};">${cat.emoji} ${cat.name} (${items.length})</span></div>`;
        listHtml+=items.map(l=>linkCard(l)).join("");
      });
    } else {
      catsPresent.forEach(cat=>{
        listHtml+=`<div style="padding:7px 14px 4px;background:${cat.bg};border-bottom:1px solid rgba(220,200,220,.12);"><span style="font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:${cat.col};">${cat.emoji} ${cat.name} (${grouped[cat.key].length})</span></div>`;
        listHtml+=grouped[cat.key].map(l=>linkCard(l)).join("");
      });
    }
  }

  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">🔗 My Links</div>
    <div class="section-sub">useful pages · always at hand 🌸</div>
    <div class="divider"></div>

    <!-- Stats strip -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
      ${[
        {v:total,          l:"Saved",   c:"var(--rose-dark)"},
        {v:pinned.length,  l:"Pinned",  c:"var(--gold)"},
        {v:Object.keys(grouped).length||0, l:"Categories",c:"var(--lavender)"},

        <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:${s.c};line-height:1;">${s.v}</div>
        <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-top:4px;">${s.l}</div>

    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-light);margin-bottom:10px;">✦ Save a Link</div>
      <input id="lk-title" style="width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;margin-bottom:7px;transition:border-color .2s;" placeholder="Title (e.g. My Bible Study Notes)" onfocus="this.style.borderColor='var(--rose)'" onblur="this.style.borderColor='#EEE0EC'"/>
      <input id="lk-url" style="width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--sky-d,#385888);background:#FAFAFA;outline:none;margin-bottom:7px;transition:border-color .2s;" placeholder="URL (e.g. https://youversion.com)" onfocus="this.style.borderColor='var(--rose)'" onblur="this.style.borderColor='#EEE0EC'" onkeydown="if(event.key==='Enter')addLink()"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;">
        <select id="lk-cat" style="border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;cursor:pointer;">
          ${LINK_CATS.filter(c=>c.key!=="all").map(c=>`<option value="${c.key}">${c.emoji} ${c.name}</option>`).join("")}
        </select>
        <input id="lk-note" placeholder="Note (optional)" style="border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 11px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--ink);background:#FAFAFA;outline:none;transition:border-color .2s;" onfocus="this.style.borderColor='var(--rose)'" onblur="this.style.borderColor='#EEE0EC'" onkeydown="if(event.key==='Enter')addLink()"/>
      </div>
      <button onclick="addLink()" style="width:100%;background:linear-gradient(135deg,#C8D0F0,#B0B8E0);border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:900;color:#384878;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 3px 10px rgba(160,170,220,.3);">🔗 Save Link</button>

    </div>

    <!-- Category filter -->
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;">
      ${LINK_CATS.map(c=>`<button onclick="linkCatFilter='${c.key}';renderLinks()" style="border-radius:20px;padding:4px 11px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid;transition:all .15s;${linkCatFilter===c.key?`background:${c.key==="all"?"linear-gradient(135deg,var(--rose),var(--rose-dark))":c.col};color:white;border-color:transparent;box-shadow:0 2px 6px rgba(0,0,0,.12);`:`background:${c.bg||"white"};color:${c.col||"var(--ink-light)"};border-color:${c.bg?"transparent":"#EEE0EC"};`}">${c.emoji} ${c.name}</button>`).join("")}

    <!-- Links list -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      ${listHtml}
    </div>
  `;
}

function addLink(){
  const title=document.getElementById("lk-title")?.value?.trim();
  const url  =document.getElementById("lk-url")?.value?.trim();
  if(!title||!url){
    if(!title)document.getElementById("lk-title")?.focus();
    else document.getElementById("lk-url")?.focus();
    return;
  }
  const cat =document.getElementById("lk-cat")?.value||"other";
  const note=document.getElementById("lk-note")?.value?.trim()||"";
  const all =linksList();
  all.unshift({id:linkUID(),title,url:cleanURL(url),cat,note,pinned:false,added:Date.now()});
  saveLinks(all);renderLinks();
}
function deleteLink(id){
  if(!confirm("Remove this link?"))return;
  saveLinks(linksList().filter(l=>l.id!==id));renderLinks();
}
function togglePinLink(id){
  const all=linksList();const l=all.find(l=>l.id===id);
  if(l)l.pinned=!l.pinned;saveLinks(all);renderLinks();
}
function copyLink(url){
  navigator.clipboard?.writeText(url).then(()=>{
    const t=document.createElement("div");
    t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:white;border-radius:20px;padding:8px 20px;font-size:13px;font-weight:800;box-shadow:0 4px 14px rgba(200,120,150,.4);z-index:9999;font-family:'Nunito',sans-serif;white-space:nowrap;";
    t.textContent="Copied! 📋";document.body.appendChild(t);setTimeout(()=>t.remove(),2000);
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
const READ_STATUSES=["Reading","Want to Read","Completed","On Hold","Abandoned"];
const RS_COL={"Reading":"#E8A0A8","Want to Read":"#B4A8D8","Completed":"#94C8A8","On Hold":"#F0C090","Abandoned":"#C8B8A8"};
const RS_BG={"Reading":"rgba(232,160,168,.12)","Want to Read":"rgba(180,168,216,.12)","Completed":"rgba(148,200,168,.15)","On Hold":"rgba(240,192,144,.12)","Abandoned":"rgba(200,184,168,.1)"};
const READ_GENRES=["Fiction","Non-Fiction","Self-Help","Christian","Biography","History","Science","Fantasy","Romance","Poetry","Other"];

function readBooks(){return lda("read_books_v1");}
function saveBooks(a){sva("read_books_v1",a);}
function buid(){return "bk"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

let readFilter="All", readSearch="";

function renderReading(){
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.reading;
  const all=readBooks();
  const reading=all.filter(b=>b.status==="Reading").length;
  const done=all.filter(b=>b.status==="Completed").length;
  const want=all.filter(b=>b.status==="Want to Read").length;
  const totalPages=all.filter(b=>b.status==="Completed").reduce((s,b)=>s+(parseInt(b.pages)||0),0);
  const goal=parseInt(ld("read_goal","12"))||12;
  const goalPct=Math.min(100,Math.round(done/goal*100));

  let filtered=[...all];
  if(readFilter!=="All")filtered=filtered.filter(b=>b.status===readFilter);
  if(readSearch.trim())filtered=filtered.filter(b=>(b.title+b.author+b.genre).toLowerCase().includes(readSearch.toLowerCase()));
  filtered.sort((a,b)=>{
    const order=["Reading","Want to Read","Completed","On Hold","Abandoned"];
    return order.indexOf(a.status)-order.indexOf(b.status);
  });

  function starRating(rating,bid){
    return Array.from({length:5},(_,i)=>`<span onclick="setRating('${bid}',${i+1})" style="font-size:16px;cursor:pointer;color:${(rating||0)>i?"#C8A848":"#EDE0D8"};transition:color .15s;">★</span>`).join("");
  }

  function bookCard(b){
    const sc=RS_COL[b.status]||"#9C8C84";
    const sbg=RS_BG[b.status]||"rgba(156,140,132,.1)";
    const pct=b.pages&&b.pagesRead?Math.min(100,Math.round(b.pagesRead/b.pages*100)):0;
    return`<div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 10px rgba(180,120,160,.07);">
      <div style="display:flex;gap:12px;padding:13px 14px 11px;">
        <!-- Spine colour bar -->
        <div style="width:5px;border-radius:3px;background:${sc};flex-shrink:0;align-self:stretch;min-height:40px;"></div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);line-height:1.25;margin-bottom:3px;">${b.title}</div>
          ${b.author?`<div style="font-size:12px;font-weight:700;color:var(--ink-light);margin-bottom:5px;">by ${b.author}</div>`:""}
          <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px;">
            <span style="background:${sbg};color:${sc};border-radius:20px;padding:2px 10px;font-size:10px;font-weight:800;">${b.status}</span>
            ${b.genre?`<span style="background:var(--gold-pale);color:var(--gold);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;">📖 ${b.genre}</span>`:""}
            ${b.pages?`<span style="font-size:10px;font-weight:700;color:var(--ink-light);">${b.pagesRead||0}/${b.pages} pp</span>`:""}
          </div>
          ${b.rating?`<div>${starRating(b.rating,b.id)}</div>`:`<div>${starRating(0,b.id)}</div>`}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
          <button onclick="cycleBookStatus('${b.id}')" style="width:30px;height:30px;border-radius:10px;background:${sbg};border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;" title="Change status">🔄</button>
          <button onclick="deleteBook('${b.id}')" style="width:30px;height:30px;border-radius:10px;background:#FFF0F0;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;">🗑️</button>
        </div>
      </div>
      <!-- Progress (if reading) -->
      ${b.status==="Reading"&&b.pages?`<div style="padding:0 14px 8px 31px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);">Progress</span>
          <span style="font-size:10px;font-weight:900;color:${sc};">${pct}%</span>
        </div>
        <div style="height:5px;background:#F0E8EC;border-radius:3px;overflow:hidden;margin-bottom:6px;"><div style="height:100%;width:${pct}%;background:${sc};border-radius:3px;transition:width .4s;"></div></div>
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="number" placeholder="Pages read" value="${b.pagesRead||""}" min="0" max="${b.pages}" style="flex:1;border:1.5px solid #EEE0EC;border-radius:8px;padding:5px 9px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;" onchange="updatePagesRead('${b.id}',this.value)"/>
          <span style="font-size:11px;font-weight:700;color:var(--ink-light);">of ${b.pages}</span>
        </div>
      </div>`:""}
      <!-- Notes -->
      ${b.notes||b.status==="Completed"?`<div style="padding:0 14px 10px 31px;">
        <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-bottom:4px;">📝 Notes</div>
        <textarea style="width:100%;border:1.5px solid #EEE0EC;border-radius:9px;padding:7px 10px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;color:var(--ink-mid);outline:none;resize:none;min-height:46px;background:#FAFAFA;line-height:1.6;" placeholder="Your thoughts, quotes, takeaways..." onchange="updateBookNote('${b.id}',this.value)">${b.notes||""}</textarea>
      </div>`:""}
    </div>`;
  }

  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">📚 Reading Tracker</div>
    <div class="section-sub">read more · grow deeper 🌸</div>
    <div class="divider"></div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;">
      ${[
        {v:reading, l:"Reading", c:"var(--rose-dark)"},
        {v:done,    l:"Done",    c:"var(--mint)"},
        {v:want,    l:"Want",    c:"var(--lavender)"},
        {v:totalPages>0?totalPages+"pp":all.length, l:totalPages>0?"Pages":"Total", c:"var(--gold)"},
      ].map(s=>`<div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:11px 6px;text-align:center;box-shadow:0 2px 8px rgba(180,120,160,.06);">
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:${s.c};line-height:1;">${s.v}</div>
        <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-top:4px;">${s.l}</div>
      </div>`).join("")}
    </div>

    <!-- Annual goal -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
        <div style="font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);">📖 2026 Reading Goal</div>
        <div style="display:flex;align-items:center;gap:5px;">
          <input type="number" value="${goal}" min="1" max="365" style="width:54px;border:1.5px solid #EEE0EC;border-radius:8px;padding:4px 7px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:var(--ink);background:#FAFAFA;outline:none;text-align:center;" onchange="sv('read_goal',this.value);renderReading()"/>
          <span style="font-size:11px;font-weight:700;color:var(--ink-light);">books</span>
        </div>
      </div>
      <div style="height:8px;background:#F0E8EC;border-radius:4px;overflow:hidden;margin-bottom:4px;"><div style="height:100%;width:${goalPct}%;background:linear-gradient(90deg,var(--gold),#E8C860);border-radius:4px;transition:width .5s;"></div></div>
      <div style="font-size:10px;font-weight:800;color:var(--gold);">${done} of ${goal} books · ${goalPct}%</div>
    </div>

    <!-- Add book form -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(180,120,160,.06);">
      <div style="font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-light);margin-bottom:10px;">✦ Add a Book</div>
      <input id="bk-title" style="width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;margin-bottom:7px;transition:border-color .2s;" placeholder="Book title..." onfocus="this.style.borderColor='var(--rose)'" onblur="this.style.borderColor='#EEE0EC'"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;">
        <input id="bk-author" style="border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 11px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;" placeholder="Author"/>
        <input id="bk-pages" type="number" style="border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 11px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;" placeholder="Pages"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;">
        <select id="bk-status" style="border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;cursor:pointer;">
          ${READ_STATUSES.map(s=>`<option value="${s}">${s}</option>`).join("")}
        </select>
        <select id="bk-genre" style="border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;cursor:pointer;">
          ${READ_GENRES.map(g=>`<option value="${g}">${g}</option>`).join("")}
        </select>
      </div>
      <button onclick="addBook()" style="width:100%;background:linear-gradient(135deg,#E8D0A8,#D8B878);border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:900;color:#5C3800;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 3px 10px rgba(200,168,80,.3);">📚 Add Book</button>
    </div>

    <!-- Search + Filter -->
    <div style="position:relative;margin-bottom:9px;">
      <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;">🔍</span>
      <input style="width:100%;border:1.5px solid #EEE0EC;border-radius:24px;padding:9px 14px 9px 40px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink);background:white;outline:none;box-shadow:0 2px 8px rgba(180,120,160,.06);" placeholder="Search books..." value="${readSearch}" oninput="readSearch=this.value;renderReading()"/>
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;">
      ${["All",...READ_STATUSES].map(f=>`<button onclick="readFilter='${f}';renderReading()" style="border-radius:20px;padding:4px 12px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;border:1.5px solid;transition:all .15s;${readFilter===f?`background:${RS_COL[f]||"linear-gradient(135deg,var(--rose),var(--rose-dark))"};color:white;border-color:transparent;`:`background:${RS_BG[f]||"white"};color:${RS_COL[f]||"var(--ink-light)"};border-color:${f==="All"?"#EEE0EC":"transparent"};`}">${f}</button>`).join("")}
    </div>

    <!-- Book list -->
    ${filtered.length===0
      ?`<div style="text-align:center;padding:36px 20px;"><span style="font-size:44px;display:block;margin-bottom:12px;">📚</span><div style="font-family:'Dancing Script',cursive;font-size:18px;color:var(--ink-light);">${all.length?"No books match":"Your shelf is empty"}</div><div style="font-size:12px;font-weight:700;color:var(--ink-light);margin-top:5px;">Add your first book above 🌸</div></div>`
      :filtered.map(b=>bookCard(b)).join("")}
  `;
}

function addBook(){
  const title=document.getElementById("bk-title")?.value?.trim();
  if(!title){document.getElementById("bk-title")?.focus();return;}
  const all=readBooks();
  all.unshift({id:buid(),title,author:document.getElementById("bk-author")?.value?.trim()||"",pages:document.getElementById("bk-pages")?.value||"",status:document.getElementById("bk-status")?.value||"Want to Read",genre:document.getElementById("bk-genre")?.value||"Other",rating:0,pagesRead:0,notes:"",added:Date.now()});
  saveBooks(all);renderReading();
}
function deleteBook(id){if(!confirm("Remove this book?"))return;saveBooks(readBooks().filter(b=>b.id!==id));renderReading();}
function cycleBookStatus(id){
  const all=readBooks();const b=all.find(b=>b.id===id);if(!b)return;
  const idx=READ_STATUSES.indexOf(b.status);b.status=READ_STATUSES[(idx+1)%READ_STATUSES.length];
  saveBooks(all);renderReading();
}
function setRating(id,r){const all=readBooks();const b=all.find(b=>b.id===id);if(!b)return;b.rating=r;saveBooks(all);renderReading();}
function updatePagesRead(id,v){const all=readBooks();const b=all.find(b=>b.id===id);if(!b)return;b.pagesRead=parseInt(v)||0;if(b.pages&&b.pagesRead>=parseInt(b.pages))b.status="Completed";saveBooks(all);renderReading();}
function updateBookNote(id,v){const all=readBooks();const b=all.find(b=>b.id===id);if(!b)return;b.notes=v;saveBooks(all);}

// ═══════════════════════════════════════════════════════════════════════════════
// ── PASSWORD TRACKER ──────────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
const PW_CATS=["All","Social","Banking","Shopping","Work","Streaming","Email","Health","Other"];
const PW_CAT_COL={Social:"#8CB8D8",Banking:"#94C8A8",Shopping:"#E8A0A8",Work:"#B4A8D8",Streaming:"#E8C890",Email:"#F0A8A8",Health:"#94C8A8",Other:"#C8B8A8"};
const PW_CAT_BG={Social:"rgba(140,184,216,.12)",Banking:"rgba(148,200,168,.12)",Shopping:"rgba(232,160,168,.12)",Work:"rgba(180,168,216,.12)",Streaming:"rgba(232,200,144,.12)",Email:"rgba(240,168,168,.12)",Health:"rgba(148,200,168,.12)",Other:"rgba(200,184,168,.1)"};
const PW_CAT_EMOJI={Social:"💬",Banking:"🏦",Shopping:"🛍️",Work:"💼",Streaming:"🎬",Email:"📧",Health:"💊",Other:"🔑"};

function pwEntries(){return lda("pw_entries_v1");}
function savePW(a){sva("pw_entries_v1",a);}
function pwUID(){return "pw"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

let pwCatFilter="All", pwSearch="", pwShowId=null;

// Simple XOR obfuscation — keeps passwords out of plain localStorage
function obfuscate(str){if(!str)return"";const k="j26pw";return btoa(str.split("").map((c,i)=>String.fromCharCode(c.charCodeAt(0)^k.charCodeAt(i%k.length))).join(""));}
function deobfuscate(str){if(!str)return"";try{const k="j26pw";return atob(str).split("").map((c,i)=>String.fromCharCode(c.charCodeAt(0)^k.charCodeAt(i%k.length))).join("");}catch(e){return str;}}

function renderPasswords(){
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.passwords;
  const all=pwEntries();
  const total=all.length;
  let filtered=[...all];
  if(pwCatFilter!=="All")filtered=filtered.filter(p=>p.cat===pwCatFilter);
  if(pwSearch.trim())filtered=filtered.filter(p=>(p.site+p.username+p.email).toLowerCase().includes(pwSearch.toLowerCase()));

  function pwCard(p){
    const cat=p.cat||"Other";
    const col=PW_CAT_COL[cat]||"#C8B8A8";
    const bg =PW_CAT_BG[cat] ||"rgba(200,184,168,.1)";
    const em =PW_CAT_EMOJI[cat]||"🔑";
    const isShowing=pwShowId===p.id;
    const pw=deobfuscate(p.pw);
    return`<div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 10px rgba(180,120,160,.07);">
      <div style="display:flex;align-items:flex-start;gap:10px;padding:13px 14px 10px;">
        <div style="width:38px;height:38px;border-radius:12px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">${em}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:800;color:var(--ink);margin-bottom:3px;">${p.site}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;">
            <span style="background:${bg};color:${col};border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;">${em} ${cat}</span>
            ${p.username?`<span style="font-size:10px;font-weight:700;color:var(--ink-light);">👤 ${p.username}</span>`:""}
            ${p.email?`<span style="font-size:10px;font-weight:700;color:var(--ink-light);">📧 ${p.email}</span>`:""}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
          <button onclick="editPWEntry('${p.id}')" style="width:30px;height:30px;border-radius:10px;background:var(--blush);border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;" title="Edit">✏️</button>
          <button onclick="deletePWEntry('${p.id}')" style="width:30px;height:30px;border-radius:10px;background:#FFF0F0;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;">🗑️</button>
        </div>
      </div>
      <!-- Password row -->
      <div style="padding:0 14px 11px;display:flex;gap:8px;align-items:center;">
        <div style="flex:1;background:#F8F4F8;border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 12px;font-family:monospace;font-size:${isShowing?13:14}px;color:${isShowing?"var(--ink)":"var(--ink-light)"};letter-spacing:${isShowing?".04em":".1em"};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
          ${isShowing?pw:"••••••••••••"}
        </div>
        <button onclick="pwShowId=pwShowId==='${p.id}'?null:'${p.id}';renderPasswords()" style="width:34px;height:34px;border-radius:10px;border:1.5px solid #EEE0EC;background:white;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;" title="${isShowing?"Hide":"Show"}">${isShowing?"🙈":"👁️"}</button>
        <button onclick="copyPW('${p.id}')" style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--lavender),var(--rose-dark));border:none;cursor:pointer;font-size:14px;color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;" title="Copy password">📋</button>
      </div>
      ${p.url?`<div style="padding:0 14px 10px;"><a href="${p.url.startsWith("http")?p.url:"https://"+p.url}" target="_blank" rel="noopener" style="font-size:11px;font-weight:800;color:var(--sky-d,#385888);text-decoration:none;">↗ ${(p.url).replace(/^https?:\/\//,"").split("/")[0]}</a></div>`:""}
      ${p.notes?`<div style="padding:0 14px 10px;font-size:11px;font-weight:600;color:var(--ink-light);background:#FAFAFA;border-top:1px solid #F0E8F0;">📝 ${p.notes}</div>`:""}
    </div>`;
  }

  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">🔐 Password Tracker</div>
    <div class="section-sub">private · stored locally · never leaves your device 🔒</div>
    <div class="divider"></div>

    <!-- Privacy notice -->
    <div style="background:var(--gold-pale);border:1px solid var(--gold-light);border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;gap:9px;align-items:flex-start;">
      <span style="font-size:18px;flex-shrink:0;">🔒</span>
      <div style="font-size:11px;font-weight:700;color:var(--gold);line-height:1.6;">All passwords are stored <strong>only in your browser</strong> using light obfuscation. They never leave your device and are not synced anywhere. For critical accounts use a dedicated password manager.</div>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
      <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 2px 8px rgba(180,120,160,.06);">
        <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--lavender);line-height:1;">${total}</div>
        <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-top:4px;">Saved</div>
      </div>
      <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 2px 8px rgba(180,120,160,.06);">
        <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--rose-dark);line-height:1;">${[...new Set(all.map(p=>p.cat))].length}</div>
        <div style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-top:4px;">Categories</div>
      </div>

function addPWEntry(){
  const site=document.getElementById("pw-site")?.value?.trim();
  if(!site){document.getElementById("pw-site")?.focus();return;}
  const pw=document.getElementById("pw-pw")?.value||"";
  const all=pwEntries();
  all.unshift({id:pwUID(),site,username:document.getElementById("pw-user")?.value?.trim()||"",email:document.getElementById("pw-email")?.value?.trim()||"",pw:obfuscate(pw),cat:document.getElementById("pw-cat")?.value||"Other",url:document.getElementById("pw-url")?.value?.trim()||"",notes:document.getElementById("pw-notes")?.value?.trim()||"",added:Date.now()});
  savePW(all);pwShowId=null;renderPasswords();
}
function deletePWEntry(id){if(!confirm("Delete this entry?"))return;savePW(pwEntries().filter(p=>p.id!==id));if(pwShowId===id)pwShowId=null;renderPasswords();}
function editPWEntry(id){
  const all=pwEntries();const p=all.find(p=>p.id===id);if(!p)return;
  const newSite=prompt("Site name:",p.site);if(newSite===null)return;
  const newUser=prompt("Username:",p.username)||"";
  const newEmail=prompt("Email:",p.email)||"";
  const newPW=prompt("Password (leave blank to keep current):");
  const newNotes=prompt("Notes:",p.notes)||"";
  p.site=newSite.trim()||p.site;p.username=newUser;p.email=newEmail;
  if(newPW!==null&&newPW!=="")p.pw=obfuscate(newPW);
  p.notes=newNotes;
  savePW(all);renderPasswords();
}
function copyPW(id){
  const p=pwEntries().find(p=>p.id===id);if(!p)return;
  const pw=deobfuscate(p.pw);
  navigator.clipboard?.writeText(pw).then(()=>{
    const t=document.createElement("div");
    t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--lavender),var(--rose-dark));color:white;border-radius:20px;padding:8px 20px;font-size:13px;font-weight:800;box-shadow:0 4px 14px rgba(180,140,200,.4);z-index:9999;font-family:'Nunito',sans-serif;white-space:nowrap;";
    t.textContent="Password copied! 🔑";document.body.appendChild(t);setTimeout(()=>t.remove(),2000);
  });
}
function togglePWVis(id){const el=document.getElementById(id);if(el)el.type=el.type==="password"?"text":"password";}
function generatePW(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%&";
  const pw=Array.from({length:16},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
  const el=document.getElementById("pw-pw");if(el){el.value=pw;el.type="text";}
}

function updateOneMtgField(id,field,val){const all=oneMtgs();const m=all.find(m=>m.id===id);if(m)m[field]=val;saveOneMtgs(all);}
function addOneMtgAction(id){
  const text=document.getElementById("om-act-text")?.value?.trim();if(!text)return;
  const owner=document.getElementById("om-act-own")?.value?.trim()||"";
  const all=oneMtgs();const m=all.find(m=>m.id===id);if(!m)return;
  if(!m.actions)m.actions=[];m.actions.push({id:oneAID(),text,owner,done:false});
  saveOneMtgs(all);renderOneMtgDetail(id);setTimeout(()=>document.getElementById("om-act-text")?.focus(),60);
}
function toggleOneMtgAction(id,idx){const all=oneMtgs();const m=all.find(m=>m.id===id);if(!m||!m.actions)return;m.actions[idx].done=!m.actions[idx].done;saveOneMtgs(all);renderOneMtgDetail(id);}
function deleteOneMtgAction(id,idx){const all=oneMtgs();const m=all.find(m=>m.id===id);if(!m||!m.actions)return;m.actions.splice(idx,1);saveOneMtgs(all);renderOneMtgDetail(id);}

// ── STANDALONE MEETING NOTES ──────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
const SA_TYPES=["Team Meeting","Client Call","Planning","Brainstorm","Review","All Hands","Training","Other"];
const SA_TYPE_EMOJI={  "Team Meeting":"👥","Client Call":"📞","Planning":"📅","Brainstorm":"💡","Review":"🔍","All Hands":"🏢","Training":"📚","Other":"📋"};
const SA_TYPE_COL={"Team Meeting":"#B4A8D8","Client Call":"#94C8A8","Planning":"#F0C090","Brainstorm":"#E8A0A8","Review":"#8CB8D8","All Hands":"#C8A848","Training":"#A0B898","Other":"#C8B8A8"};

function saMtgs(){return lda("samtg_v1");}
function saveSAMtgs(a){sva("samtg_v1",a);}
function saUID(){return "sm"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function saAID(){return "sa"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

let curSAMtg=null;

function renderStandaloneMtg(){
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.standalomtg;
  if(curSAMtg){renderSAMtgDetail(curSAMtg);return;}
  const all=saMtgs();
  const today=tds();

  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">📋 Meeting Notes</div>
    <div class="section-sub">capture every important meeting 🌸</div>
    <div class="divider"></div>

    <!-- Add new meeting -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(180,160,120,.07);">

    </div>

    <!-- Meeting list -->
    ${all.length===0?`<div style="text-align:center;padding:36px 20px;"><span style="font-size:44px;display:block;margin-bottom:12px;">📋</span><div style="font-family:'Dancing Script',cursive;font-size:18px;color:var(--ink-light);">No meetings yet</div><div style="font-size:12px;font-weight:700;color:var(--ink-light);margin-top:5px;">Create your first meeting above 🌸</div></div>`
    :all.map(m=>{

      return`<div style="background:white;border:1.5px solid #EEE0EC;border-left:4px solid ${col};border-radius:16px;padding:13px 14px;margin-bottom:9px;cursor:pointer;box-shadow:0 2px 8px rgba(180,160,120,.07);transition:all .18s;" onclick="curSAMtg='${m.id}';renderStandaloneMtg()" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform=''">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;">${em} ${m.title}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">

}

function renderSAMtgDetail(id){

  function actionRow(a,i){

    </div>`;
  }

  document.getElementById("pageInner").innerHTML=`
    <div class="nav-row">
      <button class="nav-btn" onclick="curSAMtg=null;renderStandaloneMtg()">◀ All Meetings</button>
      <button class="nav-btn" onclick="deleteSAMtg('${id}');curSAMtg=null;renderStandaloneMtg()" style="color:#C07070;border-color:#F0C0C0;">🗑️ Delete</button>
    </div>

    <!-- Header -->
    <div style="background:linear-gradient(135deg,${col}30,${col}15);border:1.5px solid ${col}50;border-radius:16px;padding:16px 18px;margin-bottom:14px;">
      <div style="font-size:9px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:${col};margin-bottom:4px;">${m.type}</div>
      <div style="font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--ink);margin-bottom:5px;">${em} ${m.title}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <span style="font-size:11px;font-weight:800;color:var(--ink-light);">📅 ${fmtDate}</span>
        ${m.time?`<span style="font-size:11px;font-weight:800;color:var(--ink-light);">⏰ ${m.time}</span>`:""}

    </div>

    <!-- Attendees -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(180,160,120,.06);">
      <div class="sec-label">👥 Attendees</div>
      <input value="${m.attendees||""}" placeholder="List attendees..." style="width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:8px 11px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;" onchange="updateSAField('${id}','attendees',this.value)"/>
    </div>

    <!-- Agenda -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(180,160,120,.06);">
      <div class="sec-label" style="color:${col};">📋 Agenda</div>

    </div>

    <!-- Notes -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(180,160,120,.06);">
      <div class="sec-label" style="color:var(--lavender);">📝 Meeting Notes</div>
      <div class="journal-lines"><textarea class="journal-textarea" rows="7" placeholder="Write your notes freely..." onchange="updateSAField('${id}','notes',this.value)">${m.notes||""}</textarea></div>
    </div>

    <!-- Decisions -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(180,160,120,.06);">
      <div class="sec-label" style="color:var(--gold);">💛 Decisions Made</div>
      <textarea class="box-textarea" style="min-height:56px;" placeholder="Key decisions reached in this meeting..." onchange="updateSAField('${id}','decisions',this.value)">${m.decisions||""}</textarea>

    <!-- Action items -->
    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(180,160,120,.06);">

      <div style="margin-bottom:6px;">${(m.actions||[]).length?m.actions.map((a,i)=>actionRow(a,i)).join(""):`<div style="font-size:12px;font-weight:700;color:var(--ink-light);padding:4px 0;">No action items yet</div>`}</div>

        <button onclick="addSAAction('${id}')" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#E8D890,#C8B860);border:none;color:#4A3800;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">+</button>

    <div style="background:white;border:1.5px solid #EEE0EC;border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(180,160,120,.06);">

      <textarea class="box-textarea" style="min-height:56px;" placeholder="Things to follow up on or check in about..." onchange="updateSAField('${id}','followups',this.value)">${m.followups||""}</textarea>
    </div>
  `;
}

function addSAMtg(){
  const title=document.getElementById("sa-title")?.value?.trim();
  if(!title){document.getElementById("sa-title")?.focus();return;}
  const all=saMtgs(); const id=saUID();
  all.unshift({id,title,type:document.getElementById("sa-type")?.value||"Other",date:document.getElementById("sa-date")?.value||tds(),time:document.getElementById("sa-time")?.value||"",attendees:"",agenda:"",notes:"",decisions:"",followups:"",actions:[],created:Date.now()});
  saveSAMtgs(all);curSAMtg=id;renderStandaloneMtg();
}
function deleteSAMtg(id){if(!confirm("Delete this meeting?"))return;saveSAMtgs(saMtgs().filter(m=>m.id!==id));}
function updateSAField(id,field,val){const all=saMtgs();const m=all.find(m=>m.id===id);if(m)m[field]=val;saveSAMtgs(all);}
function addSAAction(id){
  const text=document.getElementById("sa-act-text")?.value?.trim();if(!text)return;
  const owner=document.getElementById("sa-act-own")?.value?.trim()||"";
  const due=document.getElementById("sa-act-due")?.value||"";
  const all=saMtgs();const m=all.find(m=>m.id===id);if(!m)return;
  if(!m.actions)m.actions=[];m.actions.push({id:saAID(),text,owner,due,done:false});
  saveSAMtgs(all);renderSAMtgDetail(id);setTimeout(()=>document.getElementById("sa-act-text")?.focus(),60);
}
function toggleSAAction(id,idx){const all=saMtgs();const m=all.find(m=>m.id===id);if(!m||!m.actions)return;m.actions[idx].done=!m.actions[idx].done;saveSAMtgs(all);renderSAMtgDetail(id);}
function deleteSAAction(id,idx){const all=saMtgs();const m=all.find(m=>m.id===id);if(!m||!m.actions)return;m.actions.splice(idx,1);saveSAMtgs(all);renderSAMtgDetail(id);}

// ── INIT ──────────────────────────────────────────────────────────────────────
openJournal();
</script>

<!-- ── PWA SETUP ─────────────────────────────────────────────────────────────── -->
<script>
(function initPWA(){
  // ── 1. Generate app icon via canvas ─────────────────────────────────────────
  function makeIcon(size){
    const c=document.createElement("canvas");c.width=c.height=size;
    const ctx=c.getContext("2d");
    const g=ctx.createLinearGradient(0,0,size,size);
    g.addColorStop(0,"#F8D0D8");g.addColorStop(1,"#E8A0B8");
    ctx.fillStyle=g;
    const r=size*0.18;
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);
    ctx.quadraticCurveTo(size,0,size,r);ctx.lineTo(size,size-r);
    ctx.quadraticCurveTo(size,size,size-r,size);ctx.lineTo(r,size);
    ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);
    ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();
    ctx.fillStyle="rgba(200,120,140,.55)";ctx.fillRect(0,0,size*0.12,size);
    ctx.font=`${size*0.52}px serif`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("🌸",size*0.58,size*0.48);
    ctx.font=`bold ${size*0.13}px Arial`;
    ctx.fillStyle="#8A4850";
    ctx.fillText("2026",size*0.58,size*0.82);
    return c.toDataURL("image/png");
  }

  const icon192=makeIcon(192);
  const icon512=makeIcon(512);
  const icon180=makeIcon(180);
  document.getElementById("appleIcon").href=icon180;

  // ── 2. Inject manifest ───────────────────────────────────────────────────────
  const manifest={
    name:"My 2026 Journal 🌸",
    short_name:"My Journal",
    description:"Personal 2026 journal — days, goals, habits, Bible reading and more.",
    start_url:".",
    display:"standalone",
    orientation:"portrait",
    theme_color:"#F0C8D0",
    background_color:"#FFF9F4",
    icons:[
      {src:icon192,sizes:"192x192",type:"image/png",purpose:"any maskable"},
      {src:icon512,sizes:"512x512",type:"image/png",purpose:"any maskable"},
    ]
  };
  try{
    const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
    document.getElementById("manifestLink").href=URL.createObjectURL(blob);
  }catch(e){}

  // ── 3. Service Worker — HTTPS only (not file://) ─────────────────────────────
  // The journal works fully offline via localStorage already.
  // SW is only registered when served over HTTPS (e.g. from Netlify/GitHub Pages).
  if("serviceWorker" in navigator && location.protocol==="https:"){
    // Inline SW as a blob — safe on HTTPS
    const SW=`
const V="j26-v1";
self.addEventListener("install",e=>{self.skipWaiting();});
self.addEventListener("activate",e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener("fetch",e=>{
  if(e.request.method!=="GET")return;
  e.respondWith(
    caches.match(e.request).then(hit=>{
      const fresh=fetch(e.request).then(r=>{
        if(r&&r.status===200){const c=r.clone();caches.open(V).then(ch=>ch.put(e.request,c));}
        return r;
      }).catch(()=>hit);
      return hit||fresh;
    })
  );
});`;
    try{
      const swBlob=new Blob([SW],{type:"application/javascript"});
      const swURL=URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swURL).then(()=>{
        console.log("Journal SW registered ✅");
      }).catch(()=>{});
    }catch(e){}
  }

  // ── 4. Install prompt ────────────────────────────────────────────────────────
  window.addEventListener("beforeinstallprompt",e=>{
    e.preventDefault();
    window._pwaPrompt=e;
    if(!localStorage.getItem("pwa_dismissed"))showInstallBanner();
  });

  function showInstallBanner(){
    if(document.getElementById("installBanner"))return;
    const style=document.createElement("style");
    style.textContent="@keyframes slideUpBanner{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}";
    document.head.appendChild(style);
    const banner=document.createElement("div");
    banner.id="installBanner";
    banner.style.cssText="position:fixed;bottom:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#F8D0D8,#F0C0D0);border-top:1.5px solid rgba(200,120,140,.3);padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 -4px 20px rgba(180,100,120,.18);animation:slideUpBanner .4s ease;font-family:'Nunito',sans-serif;";
    banner.innerHTML=`
      <span style="font-size:28px;flex-shrink:0;">🌸</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:900;color:#8A4850;margin-bottom:1px;">Add to Home Screen</div>
        <div style="font-size:11px;font-weight:700;color:rgba(100,60,70,.7);">Install your journal for quick access!</div>
      </div>
      <button onclick="installPWA()" style="background:linear-gradient(135deg,#E8A0B8,#C07080);border:none;border-radius:20px;padding:8px 16px;font-size:12px;font-weight:900;color:white;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;box-shadow:0 3px 10px rgba(180,80,110,.35);">Install ✨</button>
      <button onclick="dismissBanner()" style="background:none;border:none;color:rgba(100,60,70,.6);font-size:18px;cursor:pointer;flex-shrink:0;padding:0 4px;">✕</button>`;
    document.body.appendChild(banner);
  }

  window.installPWA=function(){
    if(window._pwaPrompt){
      window._pwaPrompt.prompt();
      window._pwaPrompt.userChoice.then(r=>{
        if(r.outcome==="accepted")document.getElementById("installBanner")?.remove();
      });
    }
  };
  window.dismissBanner=function(){
    document.getElementById("installBanner")?.remove();
    localStorage.setItem("pwa_dismissed","1");
  };

  // ── 5. iOS Add to Home Screen hint ──────────────────────────────────────────
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone===true||window.matchMedia("(display-mode: standalone)").matches;
  if(isIOS&&!isStandalone&&!localStorage.getItem("pwa_dismissed")){
    setTimeout(()=>{
      const tip=document.createElement("div");
      tip.style.cssText="position:fixed;bottom:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#F8D0D8,#F0C0D0);border-top:1.5px solid rgba(200,120,140,.3);padding:12px 16px;box-shadow:0 -4px 20px rgba(180,100,120,.18);font-family:'Nunito',sans-serif;";
      tip.innerHTML=`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
          <span style="font-size:22px;">🌸</span>
          <div style="font-size:13px;font-weight:900;color:#8A4850;">Add to Home Screen</div>
          <button onclick="this.closest('[style]').remove();localStorage.setItem('pwa_dismissed','1')" style="margin-left:auto;background:none;border:none;color:rgba(100,60,70,.6);font-size:18px;cursor:pointer;">✕</button>
        </div>
        <div style="font-size:12px;font-weight:700;color:rgba(100,60,70,.75);line-height:1.6;padding-left:32px;">
          Tap the <strong>Share</strong> button ⬆️ in Safari, then tap <strong>"Add to Home Screen"</strong> 🌸
        </div>`;
      document.body.appendChild(tip);
    },2000);
  }
})();
</script>
</body>
</html>
