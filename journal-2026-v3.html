<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My 2026 Journal 🌸</title>

<!-- ── PWA META ─────────────────────────────────────────────────────────────── -->
<meta name="theme-color" content="#F0C8D0">
<meta name="description" content="My personal 2026 journal — days, goals, habits, Bible reading and more.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Journal 🌸">
<meta name="mobile-web-app-capable" content="yes">

<!-- Apple touch icons (generated inline) -->
<link rel="apple-touch-icon" id="appleIcon" href="">

<!-- PWA Manifest (inline data URI) -->
<link rel="manifest" id="manifestLink" href="">

<!-- Splash screen colour -->
<meta name="msapplication-TileColor" content="#F0C8D0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;600;700;800;900&family=Dancing+Script:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --rose:#E8A0A8;--rose-dark:#C07880;--rose-deep:#8A4850;
  --cream:#FFF9F4;--paper:#FFFDF9;--lined:#F8F4EE;
  --gold:#C8A848;--gold-light:#EDD070;--gold-pale:#FFF8DC;
  --mint:#94C8A8;--lavender:#B4A8D8;--peach:#F0C0A0;
  --sky:#8CB8D8;--sage:#A0B898;--blush:#F8D0D8;
  --ink:#3C2C24;--ink-mid:#6C5C54;--ink-light:#9C8C84;
  --shadow:0 8px 32px rgba(0,0,0,.10);
}
body{font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}
textarea,input{caret-color:var(--rose-dark);}

/* ── COVER ──────────────────────────────────────────────────────────────────── */
#coverScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FDE8E8 0%,#F8E4F4 30%,#EAE8F8 60%,#E4F0F8 100%);padding:24px;position:relative;overflow:hidden;}
.bg-blob{position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;}
.journal-book{position:relative;z-index:10;width:min(340px,90vw);background:#FFFAF5;border-radius:4px 18px 18px 4px;box-shadow:-6px 0 0 #E8D0C8,-10px 0 0 #D8C0B0,0 20px 60px rgba(180,140,130,.35),0 4px 16px rgba(180,140,130,.2);overflow:hidden;cursor:pointer;transform:rotate(-1.5deg);transition:transform .4s ease,box-shadow .4s ease;}
.journal-book:hover{transform:rotate(0deg) scale(1.02);box-shadow:-6px 0 0 #E8D0C8,-10px 0 0 #D8C0B0,0 30px 80px rgba(180,140,130,.40),0 8px 24px rgba(180,140,130,.25);}
.cover-splash{position:absolute;border-radius:50%;filter:blur(55px);pointer-events:none;}
.cs1{width:220px;height:220px;background:#FBBDD0;top:-60px;right:-40px;opacity:.45;}
.cs2{width:180px;height:180px;background:#C8C0F0;bottom:-40px;left:-30px;opacity:.40;}
.cs3{width:150px;height:150px;background:#A8D8C0;bottom:40px;right:10px;opacity:.30;}
.cs4{width:120px;height:120px;background:#F8D890;top:80px;left:-20px;opacity:.35;}
.cover-top-strip{background:linear-gradient(135deg,#F0C8D0,#E0C0D8,#C8C0E8);height:6px;width:100%;}
.cover-body{position:relative;padding:28px 28px 32px;min-height:420px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
.bot-corner{position:absolute;line-height:1;pointer-events:none;}
.bot-tl{top:16px;left:16px;font-size:36px;transform:rotate(-15deg);}
.bot-tr{top:12px;right:14px;font-size:28px;transform:rotate(20deg);}
.bot-bl{bottom:20px;left:14px;font-size:26px;transform:rotate(15deg);}
.bot-br{bottom:16px;right:16px;font-size:32px;transform:rotate(-20deg);}
.bot-ml{top:50%;left:10px;font-size:20px;transform:translateY(-50%) rotate(10deg);}
.bot-mr{top:50%;right:10px;font-size:18px;transform:translateY(-50%) rotate(-12deg);}
.cover-frame{position:absolute;inset:24px;border:1px solid rgba(200,160,150,.25);border-radius:2px;pointer-events:none;}
.cover-frame::before{content:'';position:absolute;inset:5px;border:1px dashed rgba(200,160,150,.15);border-radius:1px;}
.cover-eyebrow{font-family:'Dancing Script',cursive;font-size:14px;color:#B09088;letter-spacing:.08em;margin-bottom:8px;text-align:center;}
.cover-title{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:600;color:#7A5050;line-height:1.1;text-align:center;margin-bottom:6px;text-shadow:0 2px 12px rgba(200,140,130,.15);}
.cover-title span{font-style:italic;color:#C08090;}
.cover-year-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(240,200,190,.4),rgba(220,200,240,.4));border:1px solid rgba(200,160,150,.3);border-radius:20px;padding:5px 18px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:#9A7878;letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px;}
.cover-flowers{font-size:20px;letter-spacing:6px;margin-bottom:22px;opacity:.8;}
.cover-divider{width:80px;height:1px;margin:0 auto 16px;background:linear-gradient(90deg,transparent,#D4A8A8,transparent);}
.cover-quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:#9A8080;text-align:center;line-height:1.7;margin-bottom:24px;max-width:220px;}
.cover-open-btn{background:linear-gradient(135deg,#E8B0B8,#D0A8C8,#B0A8D8);color:white;border:none;border-radius:24px;padding:12px 32px;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;letter-spacing:.06em;box-shadow:0 6px 20px rgba(200,160,180,.45);transition:transform .2s,box-shadow .2s;}
.cover-open-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(200,160,180,.55);}
.cover-bottom-strip{background:linear-gradient(135deg,#C8C0E8,#E0C0D8,#F0C8D0);height:6px;width:100%;}
.ribbon{position:absolute;top:-8px;right:40px;width:18px;background:linear-gradient(180deg,#E8C0C8,#D0A8B8);border-radius:0 0 3px 3px;box-shadow:2px 2px 6px rgba(0,0,0,.12);z-index:20;}
.ribbon::after{content:'';display:block;border-left:9px solid #D0A8B8;border-right:9px solid #D0A8B8;border-bottom:8px solid transparent;margin-top:auto;}

/* ── JOURNAL SCREEN ─────────────────────────────────────────────────────────── */
#journalScreen{display:none;flex-direction:column;min-height:100vh;background:linear-gradient(135deg,#FFF5FB 0%,#F8F0FF 50%,#F0F8FF 100%);}
.j-topbar{background:rgba(255,255,255,.75);backdrop-filter:blur(16px);padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 0 rgba(200,160,150,.2),0 2px 12px rgba(0,0,0,.06);position:sticky;top:0;z-index:200;border-bottom:1.5px solid rgba(230,200,200,.4);}
.j-back{background:linear-gradient(135deg,#F0C8D0,#E0C0D8);border:none;border-radius:10px;padding:6px 14px;color:#7A5060;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;white-space:nowrap;}
.j-back:hover{transform:translateY(-1px);}
.j-topbar-title{font-family:'Dancing Script',cursive;font-size:20px;color:#9A6870;flex:1;text-align:center;}
.j-today-btn{background:linear-gradient(135deg,#D0C8F0,#C0D0E8);border:none;border-radius:10px;padding:6px 14px;color:#5060A0;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;white-space:nowrap;}
.j-today-btn:hover{transform:translateY(-1px);}

/* Tabs — two-row wrap so all are visible */
.j-tabs{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;background:rgba(255,255,255,.55);border-bottom:1px solid rgba(220,190,190,.25);}
.j-tab{flex-shrink:0;border:1.5px solid rgba(220,190,190,.4);border-radius:20px;padding:5px 11px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;background:white;color:var(--ink-light);transition:all .15s;letter-spacing:.02em;white-space:nowrap;}
.j-tab.active{background:linear-gradient(135deg,#F0C8D0,#E0C0D8,#D0C8E8);color:#7A5060;border-color:transparent;box-shadow:0 2px 10px rgba(200,160,170,.3);}

.j-content{flex:1;padding:14px;display:flex;justify-content:center;}
.page-shell{width:100%;max-width:520px;background:var(--paper);border-radius:12px;box-shadow:var(--shadow),0 1px 3px rgba(0,0,0,.06);overflow:hidden;animation:pageIn .3s cubic-bezier(.4,0,.2,1);}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-accent-strip{height:4px;width:100%;transition:background .3s;}
.page-inner{padding:20px 18px 26px;}

/* ── SHARED COMPONENTS ──────────────────────────────────────────────────────── */
.section-heading{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--rose-deep);margin-bottom:3px;line-height:1.2;}
.section-sub{font-size:11px;font-weight:800;color:var(--ink-light);letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px;}
.divider{height:1.5px;background:linear-gradient(90deg,var(--rose),var(--blush),transparent);border-radius:2px;margin-bottom:16px;}
.sec-label{font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-light);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #EDE0D8;display:flex;align-items:center;gap:4px;}
.line-input{width:100%;border:none;border-bottom:1.5px solid #EDE0D8;padding:5px 0;font-family:'Nunito',sans-serif;font-size:13px;color:var(--ink);background:transparent;outline:none;font-weight:600;transition:border-color .2s;}
.line-input:focus{border-bottom-color:var(--rose);}
.box-textarea{width:100%;border:1.5px solid #EDE0D8;border-radius:10px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--ink);background:var(--lined);outline:none;resize:vertical;font-weight:600;line-height:1.7;transition:border-color .2s;}
.box-textarea:focus{border-color:var(--rose);}
.nav-row{display:flex;gap:8px;margin-bottom:12px;}
.nav-btn{flex:1;border:1.5px solid #EDE0D8;border-radius:10px;padding:8px;background:white;font-size:11px;font-weight:800;color:var(--ink-mid);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.nav-btn:hover{background:var(--blush);color:var(--rose-dark);border-color:var(--rose);}

/* ── YEARLY ─────────────────────────────────────────────────────────────────── */
.year-hero{text-align:center;padding:16px 12px 14px;background:linear-gradient(135deg,#FFF0EC,#FFF5FA,#F5F0FF);border-radius:10px;margin-bottom:14px;border:1.5px solid #F0DDD8;}
.year-num{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:600;color:var(--rose-dark);line-height:1;letter-spacing:-2px;}
.year-script{font-family:'Dancing Script',cursive;font-size:16px;color:var(--rose);margin-top:2px;}
.mini-cals{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.mini-cal{background:white;border-radius:10px;padding:6px;border:1.5px solid #F0E8E0;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.mc-month{font-size:9px;font-weight:900;text-align:center;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.mcd{font-size:6.5px;text-align:center;padding:1.5px 0;color:var(--ink-mid);font-weight:600;border-radius:3px;}
.mcd.hd{color:var(--ink-light);font-weight:700;}
.mcd.su{color:#D08080;}
.mcd.td{background:var(--rose);color:white;border-radius:50%;font-weight:900;}
.mcd.link{cursor:pointer;border-radius:3px;}
.mcd.link:hover{background:var(--blush);color:var(--rose-dark);}
.word-card{background:var(--gold-pale);border:1.5px solid rgba(200,168,72,.35);border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.word-lbl{font-size:10px;font-weight:900;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:7px;}
.goals-wrap{margin-bottom:14px;}
.goal-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.goal-dot{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#F0C8D0,#D0C8E8);color:#8A6070;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── MONTH ──────────────────────────────────────────────────────────────────── */
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.month-card{border-radius:14px;border:1.5px solid;padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s;background:white;}
.month-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.1);}
.mc-emoji{font-size:24px;margin-bottom:5px;}
.mc-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;}
.mc-days{font-size:10px;font-weight:700;opacity:.65;margin-top:2px;}
.month-banner{border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.month-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.1;}
.month-verse-txt{font-size:11px;font-style:italic;font-weight:600;opacity:.8;margin-top:4px;line-height:1.5;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px;}
.cal-hd{font-size:9px;font-weight:800;text-align:center;padding:4px 0;color:var(--ink-light);text-transform:uppercase;}
.cal-hd.s{color:#E09090;}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:50%;color:var(--ink-mid);cursor:pointer;transition:all .15s;}
.cal-d:hover{background:var(--blush);color:var(--rose-dark);transform:scale(1.1);}
.cal-d.td{background:var(--rose);color:white;font-weight:900;box-shadow:0 2px 8px rgba(200,130,140,.4);}
.cal-d.su{color:#D08080;}
.cal-d.ot{opacity:.2;pointer-events:none;}
.habit-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:2px;}
.h-chk{aspect-ratio:1;border-radius:5px;border:1.5px solid #EDE0D8;background:white;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700;color:var(--ink-light);}
.h-chk.dn{background:linear-gradient(135deg,#C8EED8,#A8DCC0);border-color:#90C8A8;color:white;}

/* ── WEEKLY ─────────────────────────────────────────────────────────────────── */
.week-sel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.w-sel-btn{border:1.5px solid #EDE0D8;border-radius:10px;padding:9px 5px;background:white;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--ink-mid);text-align:center;transition:all .15s;}
.w-sel-btn:hover{background:#F0EEFF;color:#7060A0;border-color:#C8C0E8;}
.w-sel-sub{font-size:9px;font-weight:600;opacity:.7;margin-top:2px;}
.week-hero{border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.week-big-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;}
.week-dates-lbl{font-size:11px;font-weight:700;margin-top:3px;opacity:.7;}
.week-day-list{margin-bottom:14px;}
.week-day-block{margin-bottom:12px;border-radius:12px;overflow:hidden;border:1.5px solid #EDE0D8;background:white;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.week-day-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;}
.week-day-name{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:white;}
.week-day-date{font-size:12px;font-weight:800;color:white;opacity:.85;}
.week-day-write{width:100%;border:none;background:repeating-linear-gradient(transparent,transparent 27px,#EDE5DD 27px,#EDE5DD 28px);padding:10px 14px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--ink);outline:none;resize:none;min-height:130px;font-weight:600;line-height:28px;display:block;}
.week-day-write.wknd{background:repeating-linear-gradient(transparent,transparent 27px,#E8E0EC 27px,#E8E0EC 28px);}
.week-panels{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.week-panel{background:white;border:1.5px solid #EDE0D8;border-radius:12px;padding:12px;}
.week-panel-lbl{font-size:9px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;}
.week-panel-area{width:100%;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:12px;color:var(--ink);outline:none;resize:none;min-height:80px;font-weight:600;line-height:1.7;}
.week-panel-full{background:white;border:1.5px solid #EDE0D8;border-radius:12px;padding:12px;margin-bottom:10px;}

/* ── DAILY ──────────────────────────────────────────────────────────────────── */
.day-sel-input{width:100%;border:1.5px solid #EDE0D8;border-radius:12px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--ink);outline:none;background:white;transition:border-color .2s;}
.day-sel-input:focus{border-color:var(--rose);}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px;}
.quick-btn{border:1.5px solid #EDE0D8;border-radius:10px;padding:9px 4px;background:white;font-size:11px;font-weight:800;color:var(--ink-mid);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;text-align:center;}
.quick-btn:hover{background:var(--blush);color:var(--rose-dark);border-color:var(--rose);}
.day-nav{display:flex;gap:8px;margin-bottom:12px;}
.day-nav-btn{flex:1;border:1.5px solid #EDE0D8;border-radius:10px;padding:8px;background:white;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.day-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1.5px solid;}
.day-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.1;}
.day-weekday-lbl{font-family:'Dancing Script',cursive;font-size:16px;margin-top:2px;}
.day-badge{border-radius:12px;padding:7px 12px;text-align:right;}
.day-badge-big{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;display:block;line-height:1;}
.day-badge-sub{font-size:9px;font-weight:800;opacity:.7;letter-spacing:.1em;text-transform:uppercase;}
.scripture-card{border-radius:10px;padding:10px 13px;margin-bottom:12px;}
.scripture-txt{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;line-height:1.6;font-weight:400;}
.day-section{margin-bottom:12px;}
.day-lbl{font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.journal-lines{background:repeating-linear-gradient(transparent,transparent 27px,#EDE5DD 27px,#EDE5DD 28px);border-radius:8px;padding:4px 0;}
.journal-textarea{width:100%;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;color:var(--ink);outline:none;resize:none;font-weight:600;line-height:28px;min-height:56px;display:block;padding:0 12px;}
.grat-line{display:flex;align-items:center;gap:8px;border-bottom:1.5px solid #EDE5DD;padding:5px 0;}
.grat-n{font-size:13px;color:var(--rose);font-weight:900;flex-shrink:0;}
.grat-in{flex:1;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;color:var(--ink);outline:none;font-weight:600;padding:0;}
.mood-row{display:flex;gap:8px;justify-content:center;padding:8px 0;}
.mood-b{font-size:26px;border:none;background:none;cursor:pointer;padding:4px 6px;border-radius:8px;transition:all .15s;opacity:.4;}
.mood-b:hover,.mood-b.on{opacity:1;background:#F8F0EC;transform:scale(1.18);}
.water-row{display:flex;gap:3px;justify-content:center;padding:6px 0;}
.drop-b{font-size:18px;border:none;background:none;cursor:pointer;opacity:.28;transition:all .18s;}
.drop-b.on{opacity:1;}
/* ── TOP 3 PRIORITIES ─────────────────────────────────────────────────────── */
.pri3-card{border-radius:14px;padding:13px 14px;margin-bottom:12px;border:1.5px solid;}
.pri3-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1.5px solid rgba(0,0,0,.06);}
.pri3-row:last-child{border-bottom:none;}
.pri3-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:white;flex-shrink:0;}
.pri3-in{flex:1;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink);outline:none;padding:2px 0;}
.pri3-in::placeholder{color:rgba(0,0,0,.25);font-weight:600;}
.pri3-done-chk{width:22px;height:22px;border-radius:50%;border:2px solid rgba(0,0,0,.15);background:white;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .18s;}
.pri3-done-chk.done{background:linear-gradient(135deg,#88C8A8,#60A880);border-color:transparent;color:white;}
/* ── TIME BLOCKING ────────────────────────────────────────────────────────── */
.timeblock-card{background:white;border:1.5px solid #EDE0D8;border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.tb-header{padding:11px 14px 9px;border-bottom:1px solid #F0E8EC;}
.tb-row{display:flex;align-items:stretch;min-height:38px;border-bottom:1px solid #F5EFF5;transition:background .15s;}
.tb-row:last-child{border-bottom:none;}
.tb-row:hover{background:#FDF8FD;}
.tb-time{width:68px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:6px 10px 6px 6px;border-right:2px solid #F0E8F0;}
.tb-time-main{font-size:11px;font-weight:900;color:var(--ink-mid);line-height:1;}
.tb-time-ampm{font-size:8px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;opacity:.6;margin-top:2px;}
.tb-slot{flex:1;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);outline:none;padding:8px 12px;resize:none;line-height:1.4;min-height:38px;}
.tb-slot::placeholder{color:rgba(0,0,0,.2);font-weight:600;}
/* Time period colour bands */
.tb-row.morning{border-left:3px solid #F0C8A0;}
.tb-row.morning .tb-time-main{color:#C08040;}
.tb-row.midday{border-left:3px solid #F0D878;}
.tb-row.midday .tb-time-main{color:#A09030;}
.tb-row.afternoon{border-left:3px solid #C8D8F0;}
.tb-row.afternoon .tb-time-main{color:#4870A8;}
.tb-row.evening{border-left:3px solid #D0C0E8;}
.tb-row.evening .tb-time-main{color:#7060A8;}
.tb-row.night{border-left:3px solid #A8B8D8;}
.tb-row.night .tb-time-main{color:#405888;}

/* ── TO DO LIST — redesigned ────────────────────────────────────────────────── */
.todo-header{display:flex;gap:8px;margin-bottom:14px;align-items:stretch;}
.todo-input-wrap{flex:1;display:flex;border:1.5px solid #EDE0D8;border-radius:12px;overflow:hidden;background:white;}
.todo-input{flex:1;border:none;padding:10px 13px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink);outline:none;background:transparent;}
.todo-add-btn{background:linear-gradient(135deg,#F0C8D0,#D0C8E8);border:none;padding:0 16px;font-size:18px;cursor:pointer;color:#8A5070;transition:all .15s;}
.todo-cat-sel{border:1.5px solid #EDE0D8;border-radius:10px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink-mid);background:white;outline:none;cursor:pointer;}
/* Top add-task pill button */
.td-add-task-btn{background:linear-gradient(135deg,#C0A8E0,#B090D0);border:none;border-radius:24px;padding:10px 20px;font-size:13px;font-weight:900;color:white;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:7px;box-shadow:0 3px 12px rgba(180,140,220,.4);transition:all .18s;white-space:nowrap;}
.td-add-task-btn:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(180,140,220,.5);}
/* Filter chips row */
.td-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.td-chip{border:1.5px solid #EDE0D8;border-radius:20px;padding:5px 13px;background:white;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--ink-mid);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.td-chip:hover{background:#F8F0F8;border-color:#D8C0D8;}
.td-chip.on{background:linear-gradient(135deg,#F0A8C8,#D890B8);color:white;border-color:transparent;box-shadow:0 2px 8px rgba(220,130,170,.35);}
.td-chip.chip-high.on{background:linear-gradient(135deg,#F08080,#D06060);border-color:transparent;}
.td-chip.chip-ov.on{background:linear-gradient(135deg,#F0A050,#D08030);border-color:transparent;}
.td-chip.chip-clear{color:#A08898;border-color:#EDE0D8;}
.td-chip.chip-clear:hover{background:#FFF0F0;color:#C07070;border-color:#F0C0C0;}
/* Section title */
.td-section-hdr{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:900;color:var(--ink);margin:14px 0 10px;padding-bottom:8px;border-bottom:2px dashed #EDE8F0;}
/* NEW task card */
.td2-card{background:white;border:1.5px solid #ECD8E8;border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 10px rgba(180,120,160,.08);animation:todoIn .25s ease;}
.td2-card.priority-high{border-color:#F0C8C8;}
.td2-card.priority-low{border-color:#C8E8D8;}
@keyframes todoIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.td2-card.done-card{opacity:.55;}
.td2-card.done-card .td2-title{text-decoration:line-through;color:var(--ink-light);}
/* Card top row */
.td2-top{display:flex;align-items:flex-start;gap:10px;padding:13px 13px 10px;}
.td2-chk{width:24px;height:24px;border-radius:50%;border:2px solid #D8C0D8;background:white;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .18s;margin-top:1px;}
.td2-chk:hover{border-color:var(--rose);}
.td2-chk.done{background:linear-gradient(135deg,#88C8A8,#60A880);border-color:transparent;color:white;}
.td2-main{flex:1;min-width:0;}
.td2-title{font-size:14px;font-weight:800;color:var(--ink);line-height:1.3;margin-bottom:7px;}
.td2-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.td2-badge{border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.td2-badge.b-high{background:#FFEAEA;color:#C05060;border:1px solid #F0C8C8;}
.td2-badge.b-med{background:#FFF8DC;color:#A07020;border:1px solid #F0D878;}
.td2-badge.b-low{background:#EDFFF5;color:#3A8860;border:1px solid #A8DCC0;}
.td2-badge.b-date{background:#EDFFF0;color:#3A7850;border:1px solid #A8D8B8;}
.td2-badge.b-date.overdue{background:#FFF0F0;color:#C05060;border-color:#F0C8C8;}
.td2-badge.b-date.today{background:#FFF8DC;color:#A07020;border-color:#F0D878;}
.td2-badge.b-subs{background:#EEF0FF;color:#5858A8;border:1px solid #C0C0E8;}
.td2-icons{display:flex;gap:5px;flex-shrink:0;margin-left:4px;}
.td2-icon-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;}
.td2-icon-btn.edit{background:#F8F0FF;color:#9060C0;}
.td2-icon-btn.edit:hover{background:#EEE0FF;}
.td2-icon-btn.del{background:#FFF0F0;color:#C07878;}
.td2-icon-btn.del:hover{background:#FFE0E0;}
/* Note box */
.td2-note{margin:0 13px 10px;background:#F8F5F8;border-radius:10px;padding:9px 12px;font-size:12px;font-weight:600;color:#7A6878;line-height:1.6;}
/* Progress */
.td2-progress{margin:0 13px 10px;}
.td2-prog-bar-wrap{height:8px;background:#F0EAF4;border-radius:4px;overflow:hidden;margin-bottom:5px;}
.td2-prog-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#60B890,#3A9870);transition:width .4s ease;}
.td2-prog-label{display:flex;justify-content:space-between;font-size:10px;font-weight:800;color:var(--ink-light);}
/* Subtasks section */
.td2-subs-section{border-top:1.5px dashed #EDE8F0;margin:0;padding:10px 13px 4px;}
.td2-subs-hdr{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#5858A8;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.td2-sub-row{display:flex;align-items:center;gap:9px;padding:8px 12px;background:#FAFAFA;border:1.5px solid #EDE8F0;border-radius:10px;margin-bottom:6px;transition:all .15s;}
.td2-sub-row.done-sub{background:#F5FFF8;border-color:#C8E8D0;}
.td2-sub-chk{width:20px;height:20px;border-radius:50%;border:2px solid #C8B8D8;background:white;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .18s;}
.td2-sub-chk.done{background:linear-gradient(135deg,#88C8A8,#60A880);border-color:transparent;color:white;}
.td2-sub-text{flex:1;font-size:12px;font-weight:700;color:var(--ink);}
.td2-sub-text.done{text-decoration:line-through;color:var(--ink-light);}
.td2-sub-del{background:none;border:none;color:#D8C8D8;cursor:pointer;font-size:13px;flex-shrink:0;padding:0;line-height:1;}
.td2-sub-del:hover{color:#C07878;}
/* Add subtask row */
.td2-add-sub-row{display:flex;align-items:center;gap:8px;padding:6px 0 8px;}
.td2-add-sub-in{flex:1;border:1.5px solid #EDE8F0;border-radius:24px;padding:8px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);background:#FAFAFA;outline:none;transition:border-color .2s;}
.td2-add-sub-in:focus{border-color:#9878B8;background:white;}
.td2-add-sub-btn{width:32px;height:32px;border-radius:50%;border:none;background:linear-gradient(135deg,#C0A8E0,#A888C8);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(180,140,220,.4);}
/* Edit note row */
.td2-edit-note{margin:0 13px 10px;}
.td2-note-ta{width:100%;border:1.5px solid #EDE8F0;border-radius:10px;padding:8px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--ink);background:#F8F5F8;outline:none;resize:none;min-height:56px;line-height:1.6;transition:border-color .2s;}
.td2-note-ta:focus{border-color:#9878B8;}
/* Completed section */
.td2-done-section{margin-top:16px;padding-top:12px;border-top:1.5px dashed #EDE0D8;}
.td2-done-hdr{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);margin-bottom:10px;}
/* Priority select row */
.pri-opt{flex:1;border:1.5px solid #EDE0D8;border-radius:10px;padding:5px 2px;background:white;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;text-align:center;transition:all .15s;color:var(--ink-mid);}
.pri-opt.on{box-shadow:0 2px 8px rgba(0,0,0,.1);}
/* due badges (kept for compat) */
.due-badge{font-size:10px;font-weight:800;border-radius:8px;padding:2px 8px;white-space:nowrap;}
.due-badge.overdue{background:#FFF0F0;color:#C05060;border:1px solid #F0C0C0;}
.due-badge.today{background:#FFF8DC;color:#A07020;border:1px solid #F0D878;}
.due-badge.soon{background:#EEF8FF;color:#4878A8;border:1px solid #B0C8E0;}
.due-badge.normal{background:#F5F5F5;color:#888;border:1px solid #E0E0E0;}
/* Urgent overdue (kept) */
.todo-urgent-section{margin-bottom:14px;}
.urgent-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 12px;border-radius:12px;}
.urgent-header.overdue-hdr{background:linear-gradient(135deg,#FFF0F0,#FDE8E8);border:1.5px solid #F0C0C0;}
.urgent-hdr-title{font-size:12px;font-weight:900;color:var(--ink);}
.urgent-hdr-count{background:white;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:900;}
.urgent-hdr-count.ov{color:#C05060;border:1px solid #F0C0C0;}
.urgent-item{display:flex;align-items:flex-start;gap:9px;padding:9px 10px;background:white;border-radius:10px;margin-bottom:6px;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.urgent-item.overdue-item{border:1.5px solid #F0C8C8;border-left:3px solid #F09090;}

/* ── BIBLE TRACKER ──────────────────────────────────────────────────────────── */
.bible-testament{margin-bottom:16px;}
.bt-heading{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--rose-deep);margin-bottom:10px;padding-bottom:6px;border-bottom:1.5px solid #EDE0D8;}
.bible-book-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.bible-book-card{background:white;border:1.5px solid #F0E8EC;border-radius:10px;padding:10px 10px 8px;cursor:pointer;transition:all .15s;}
.bible-book-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.07);}
.bbc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.bbc-name{font-size:12px;font-weight:800;color:var(--ink);}
.bbc-prog{font-size:10px;font-weight:800;color:var(--ink-light);}
.bbc-bar-wrap{height:5px;background:#F0E8EC;border-radius:3px;overflow:hidden;}
.bbc-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--rose),var(--lavender));transition:width .4s ease;}
.bbc-chapters{display:flex;flex-wrap:wrap;gap:2px;margin-top:7px;}
.bcc{width:18px;height:18px;border-radius:4px;border:1.5px solid #EDE0D8;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:var(--ink-light);transition:all .15s;}
.bcc:hover{border-color:var(--rose);}
.bcc.rd{background:linear-gradient(135deg,#F0C8D0,#D0C8E8);border-color:transparent;color:white;}
.bible-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.bs-card{background:white;border-radius:12px;padding:12px 8px;text-align:center;border:1.5px solid #F0E8EC;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.bs-val{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--rose-dark);}
.bs-lbl{font-size:9px;font-weight:800;color:var(--ink-light);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

/* ── INVENTORY ──────────────────────────────────────────────────────────────── */
.inv-add-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.inv-input{flex:1;min-width:120px;border:1.5px solid #EDE0D8;border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink);outline:none;background:white;transition:border-color .2s;}
.inv-input:focus{border-color:var(--rose);}
.inv-input.sm{max-width:80px;flex:none;text-align:center;}
.inv-add-btn{background:linear-gradient(135deg,#F0C8D0,#D0C8E8);border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:800;color:#8A5070;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;white-space:nowrap;}
.inv-add-btn:hover{transform:translateY(-1px);}
.inv-table{width:100%;border-collapse:collapse;}
.inv-table th{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);padding:6px 8px;text-align:left;border-bottom:1.5px solid #EDE0D8;}
.inv-table td{padding:9px 8px;border-bottom:1px solid #F5EEF0;font-size:12px;font-weight:700;color:var(--ink-mid);vertical-align:middle;}
.inv-table tr:hover td{background:#FFF8FA;}
.inv-qty-wrap{display:flex;align-items:center;gap:5px;}
.inv-qty-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid #EDE0D8;background:white;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--ink-mid);transition:all .15s;font-family:'Nunito',sans-serif;}
.inv-qty-btn:hover{background:var(--blush);border-color:var(--rose);}
.inv-qty{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--rose-dark);min-width:28px;text-align:center;}
.inv-low{color:#E08080;background:#FFF0F0;border-radius:8px;padding:1px 6px;font-size:10px;font-weight:800;}
.inv-cat-tag{border-radius:8px;padding:2px 7px;font-size:10px;font-weight:800;}
.inv-del{background:none;border:none;color:#D8C0C8;cursor:pointer;font-size:14px;}
.inv-del:hover{color:var(--rose);}
.inv-cat-filter{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
.inv-cat-filter::-webkit-scrollbar{display:none;}
.icf-btn{flex-shrink:0;border:1.5px solid #EDE0D8;border-radius:20px;padding:4px 12px;background:white;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--ink-light);transition:all .15s;}
.icf-btn.on{background:linear-gradient(135deg,#F0C8D0,#D0C8E8);color:white;border-color:transparent;}

/* ── MEDICINE ────────────────────────────────────────────────────────────────── */
.med-add-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.med-add-full{grid-column:1/-1;}
.med-input{width:100%;border:1.5px solid #EDE0D8;border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink);outline:none;background:white;transition:border-color .2s;}
.med-input:focus{border-color:var(--lavender);}
.med-add-btn{grid-column:1/-1;background:linear-gradient(135deg,var(--lavender),#C8B8E8);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:800;color:white;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 3px 10px rgba(180,168,216,.35);}
.med-date-nav{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.med-date-btn{border:1.5px solid #EDE0D8;border-radius:8px;padding:6px 12px;background:white;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--ink-mid);transition:all .15s;}
.med-date-btn:hover{background:var(--lavender-soft,#F0EEFF);color:#7060A0;}
.med-date-label{flex:1;text-align:center;font-size:13px;font-weight:800;color:var(--ink-mid);}
.med-card{background:white;border-radius:14px;padding:14px;margin-bottom:10px;border:1.5px solid rgba(180,168,216,.25);box-shadow:0 2px 10px rgba(0,0,0,.05);}
.med-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.med-icon{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--lavender-soft,#F0EEFF),rgba(180,168,216,.2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.med-name{font-size:14px;font-weight:900;color:var(--ink);}
.med-dose{font-size:11px;font-weight:700;color:var(--ink-light);margin-top:1px;}
.med-del-btn{background:none;border:none;color:#D8C0C8;cursor:pointer;font-size:14px;margin-left:auto;}
.med-times{display:flex;gap:8px;flex-wrap:wrap;}
.med-time-chk{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1.5px solid rgba(180,168,216,.3);background:white;cursor:pointer;transition:all .15s;font-size:12px;font-weight:800;color:var(--ink-mid);}
.med-time-chk.taken{background:linear-gradient(135deg,#C8EED8,#A8DCC0);border-color:transparent;color:white;}
.med-time-chk:hover{border-color:var(--lavender);}

/* ── JOURNAL PAGES ──────────────────────────────────────────────────────────── */
.pages-index{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.page-thumb{
  background:white;border-radius:14px;padding:14px 12px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);border:1.5px solid #EDE0D8;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  min-height:110px;display:flex;flex-direction:column;
}
.page-thumb:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
.page-thumb::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:4px 4px 0 0;}
.page-thumb-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:6px;flex:1;}
.page-thumb-preview{font-size:11px;color:var(--ink-light);font-weight:600;line-height:1.4;flex:2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.page-thumb-meta{font-size:9px;font-weight:800;color:var(--ink-light);letter-spacing:.08em;text-transform:uppercase;margin-top:8px;}
.page-thumb-del{position:absolute;top:8px;right:8px;background:none;border:none;color:#D8C0C8;cursor:pointer;font-size:14px;line-height:1;padding:2px;}
.page-thumb-del:hover{color:var(--rose-dark);}
.new-page-btn{
  width:100%;background:linear-gradient(135deg,#F0C8D0,#E0C0D8,#D0C8E8);
  border:none;border-radius:14px;padding:14px;
  font-size:14px;font-weight:900;color:white;cursor:pointer;
  font-family:'Nunito',sans-serif;box-shadow:0 4px 14px rgba(200,160,180,.4);

/* Single page view */

.lp-tag-input{

}

    transparent 31px,
    #EDE5DD 31px,

.lp-back-btn{

  font-family:'Nunito',sans-serif;transition:all .15s;margin-bottom:12px;
}
.lp-back-btn:hover{background:var(--blush);color:var(--rose-dark);border-color:var(--rose);}
.pages-empty{text-align:center;padding:32px 16px;color:var(--ink-light);font-size:13px;font-weight:700;line-height:1.6;}

.page-tag{display:inline-block;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;margin-top:4px;}

/* ── RESET PAGES ───────────────────────────────────────────────────────────── */
.reset-page-wrap{background:white;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1.5px solid #EDE0D8;overflow:hidden;margin-bottom:14px;}
.reset-page-hdr{padding:16px 18px 12px;border-bottom:1.5px solid #F0E8EC;}
.reset-page-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1.2;margin-bottom:4px;}
.reset-page-sub{font-size:11px;font-weight:700;color:var(--ink-light);font-style:italic;}
.reset-sel-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.reset-sel-btn{flex:1;min-width:80px;border:1.5px solid #EDE0D8;border-radius:10px;padding:8px 6px;background:white;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--ink-mid);text-align:center;transition:all .15s;}
.reset-sel-btn.on{box-shadow:0 2px 8px rgba(0,0,0,.1);}
.reset-section{padding:14px 18px;border-bottom:1px solid #F5EEF0;}
.reset-section:last-child{border-bottom:none;}
.reset-sec-lbl{font-size:10px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.reset-textarea{width:100%;border:1.5px solid #EDE0D8;border-radius:10px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--ink);outline:none;resize:none;background:var(--lined);min-height:72px;line-height:1.7;transition:border-color .2s;}
.reset-textarea:focus{border-color:var(--rose);}
.reset-input{width:100%;border:none;border-bottom:1.5px solid #EDE0D8;padding:5px 0;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--ink);outline:none;background:transparent;transition:border-color .2s;}
.reset-input:focus{border-bottom-color:var(--rose);}
.reset-goal-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.reset-goal-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:white;flex-shrink:0;}
.reset-rate-row{display:flex;gap:6px;flex-wrap:wrap;}
.rate-btn{border:1.5px solid #EDE0D8;border-radius:8px;padding:6px 10px;background:white;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--ink-mid);transition:all .15s;min-width:36px;text-align:center;}
.rate-btn.on{box-shadow:0 2px 8px rgba(0,0,0,.1);color:white;}
/* ── KANBAN ──────────────────────────────────────────────────────────────────── */
.kanban-board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.kanban-col{background:rgba(255,255,255,.6);border-radius:16px;overflow:hidden;border:1.5px solid rgba(220,200,220,.35);}
.kanban-col-hdr{padding:11px 12px 10px;border-bottom:1.5px solid rgba(220,200,220,.25);}
.kanban-col-title{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;}
.kanban-col-count{font-size:10px;font-weight:800;background:rgba(255,255,255,.7);border-radius:8px;padding:1px 7px;margin-top:3px;display:inline-block;}
.kanban-cards{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:60px;}
.kanban-card{background:white;border-radius:10px;padding:9px 10px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1.5px solid rgba(220,200,220,.3);cursor:pointer;transition:all .15s;position:relative;}
.kanban-card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.1);}
.kc-text{font-size:11px;font-weight:800;color:var(--ink);line-height:1.35;margin-bottom:5px;}
.kc-meta{display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
.kc-move{border:none;border-radius:6px;padding:2px 5px;font-size:9px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;transition:all .15s;background:rgba(240,220,240,.5);color:var(--ink-mid);}
.kc-move:hover{opacity:.8;}
.kanban-add-btn{width:100%;border:none;background:transparent;padding:7px;font-size:11px;font-weight:800;color:var(--ink-light);cursor:pointer;font-family:'Nunito',sans-serif;border-top:1px dashed rgba(220,200,220,.4);transition:all .15s;}
.kanban-add-btn:hover{color:var(--rose-dark);background:rgba(255,255,255,.5);}
.col-todo .kanban-col-hdr{background:rgba(192,174,224,.15);}
.col-doing .kanban-col-hdr{background:rgba(240,200,100,.12);}
.col-done .kanban-col-hdr{background:rgba(136,200,168,.15);}
/* Task expand modal */
.task-modal-ov{position:fixed;inset:0;z-index:600;background:rgba(48,32,40,.28);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;}
.task-modal-box{background:var(--paper);border-radius:24px 24px 0 0;padding:20px 20px 48px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.12);animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
.tm-lbl{font-size:9px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-light);margin-bottom:5px;margin-top:12px;display:block;}
.tm-textarea{width:100%;border:1.5px solid #EEE0EC;border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--ink);outline:none;resize:none;background:var(--lined);line-height:1.6;transition:border-color .2s;min-height:70px;}
.tm-textarea:focus{border-color:var(--rose);}
.subtask-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:white;border-radius:9px;border:1.5px solid #EEE0EC;margin-bottom:5px;}
.st-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid #D8C0C8;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s;}
.st-chk.done{background:linear-gradient(135deg,#A8D8B8,#80C8A0);border-color:transparent;color:white;}
.st-text{flex:1;font-size:12px;font-weight:700;color:var(--ink);}
.st-text.done{text-decoration:line-through;color:var(--ink-light);}
.st-del{background:none;border:none;color:#D8C0C8;cursor:pointer;font-size:12px;}
/* Inline subtasks on card */
.card-subtasks{margin-top:8px;padding-top:8px;border-top:1px dashed #EEE0EC;}
.inline-sub-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(220,200,220,.15);}
.inline-sub-row:last-child{border-bottom:none;}
.inline-st-chk{width:16px;height:16px;border-radius:50%;border:1.5px solid #D8C0C8;background:white;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;}
.inline-st-chk.done{background:linear-gradient(135deg,#A8D8B8,#80C8A0);border-color:transparent;color:white;}
.inline-st-text{flex:1;font-size:11px;font-weight:700;color:var(--ink);line-height:1.3;}
.inline-st-text.done{text-decoration:line-through;color:var(--ink-light);}
.inline-st-del{background:none;border:none;color:#E0C8C8;cursor:pointer;font-size:11px;padding:0;opacity:0;transition:opacity .15s;}
.inline-sub-row:hover .inline-st-del{opacity:1;}
.quick-sub-row{display:flex;gap:6px;margin-top:6px;align-items:center;}
.quick-sub-input{flex:1;border:1.5px solid #EEE0EC;border-radius:20px;padding:5px 10px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:var(--ink);outline:none;background:white;transition:border-color .2s;}
.quick-sub-input:focus{border-color:var(--rose);}
.quick-sub-btn{border:none;border-radius:20px;padding:5px 11px;background:linear-gradient(135deg,#E8C0D0,#D0B8E0);color:white;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;flex-shrink:0;}
.add-sub-toggle{background:none;border:none;font-size:10px;font-weight:800;color:var(--rose-dark);cursor:pointer;padding:0;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:3px;margin-top:5px;opacity:.75;transition:opacity .15s;}
.add-sub-toggle:hover{opacity:1;}
.subtask-add-row{display:flex;gap:7px;margin-top:4px;}
.subtask-input{flex:1;border:1.5px solid #EEE0EC;border-radius:9px;padding:7px 10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink);outline:none;background:white;transition:border-color .2s;}
.subtask-input:focus{border-color:var(--rose);}
.subtask-add-btn{border:none;border-radius:9px;padding:7px 14px;background:linear-gradient(135deg,#E8C0D0,#D0B8E0);color:white;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.bp-add-card{background:white;border:1.5px solid rgba(220,200,210,.3);border-radius:14px;padding:14px;margin-bottom:14px;}
.bp-add-title{font-size:11px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-light);margin-bottom:12px;}
.bp-inputs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.bp-field{display:flex;flex-direction:column;gap:4px;}
.bp-field-lbl{font-size:9px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);text-align:center;}
.bp-input{width:100%;border:1.5px solid #EDE0D8;border-radius:10px;padding:9px 6px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--ink);outline:none;background:white;text-align:center;transition:border-color .2s;}
.bp-input:focus{border-color:var(--rose);}
.bp-save-btn{width:100%;background:linear-gradient(135deg,#F0C8D0,#D0C8E8);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:800;color:#8A5070;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.bp-save-btn:hover{transform:translateY(-1px);}
.bp-chart-wrap{background:white;border-radius:14px;padding:14px;margin-bottom:12px;border:1.5px solid rgba(220,200,210,.3);}
.bp-chart-title{font-size:11px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-light);margin-bottom:10px;}
.bp-chart-svg{width:100%;height:120px;display:block;}
.bp-legend{display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:10px;font-weight:800;color:var(--ink-light);}
.bp-leg-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.bp-log{background:white;border-radius:14px;padding:14px;border:1.5px solid rgba(220,200,210,.3);}
.bp-log-title{font-size:11px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-light);margin-bottom:10px;}
.bp-entry{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F5EEF0;}
.bp-entry:last-child{border-bottom:none;}
.bp-date-lbl{font-size:11px;font-weight:800;color:var(--ink-light);min-width:70px;}
.bp-reading{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--rose-dark);flex:1;}
.bp-reading span{font-size:12px;color:var(--ink-light);}
.bp-pulse{font-size:12px;font-weight:800;color:var(--ink-mid);}
.bp-status{font-size:10px;font-weight:800;border-radius:8px;padding:2px 7px;}
.bp-status.normal{background:#EDFFF5;color:#3A8860;}
.bp-status.elevated{background:#FFF8EE;color:#A07030;}
.bp-status.high{background:#FFF0F4;color:#C07880;}
.bp-del{background:none;border:none;color:#D8C0C8;cursor:pointer;font-size:12px;}
.bp-del:hover{color:var(--rose);}

/* Reset index grids */
.month-pill-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.month-pill-card{background:white;border-radius:14px;padding:14px 10px 12px;border:1.5px solid #EDE0D8;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden;}
.month-pill-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.1);}
.month-pill-card.started{border-width:2px;}
.mpc-top-bar{position:absolute;top:0;left:0;right:0;height:4px;border-radius:4px 4px 0 0;}
.mpc-emoji{font-size:22px;margin-bottom:5px;display:block;}
.mpc-name{font-family:'Playfair Display',serif;font-size:12px;font-weight:700;}
.mpc-status{font-size:9px;font-weight:800;margin-top:4px;letter-spacing:.06em;}
.week-pill-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.week-pill-card{background:white;border-radius:10px;padding:9px 5px;border:1.5px solid #EDE0D8;cursor:pointer;transition:all .15s;text-align:center;}
.week-pill-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08);}
.week-pill-card.started{border-color:#90C8A0;background:#F5FFF7;}
.wpc-num{font-family:'Fredoka One',cursive;font-size:15px;color:var(--ink);line-height:1.1;}
.wpc-dates{font-size:8px;font-weight:700;color:var(--ink-light);margin-top:3px;line-height:1.3;}
.wpc-dot{width:6px;height:6px;border-radius:50%;background:#90C8A0;margin:4px auto 0;}
.bp-del:hover{color:var(--rose);}
.bp-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
</style>
</head>

function dateFromDOY(doy){const d=new Date(2026,0,1);d.setDate(d.getDate()+doy-1);return d;}
function doyFromDate(d){return Math.floor((d-new Date(2026,0,1))/(864e5))+1;}
function monthForDOY(doy){let c=0;for(let i=0;i<MONTHS.length;i++){if(doy<=c+MONTHS[i].days)return i;c+=MONTHS[i].days;}return 11;}
function dayInMonth(doy){let c=0;for(const m of MONTHS){if(doy<=c+m.days)return doy-c;c+=m.days;}return 1;}
function weekNum(doy){return Math.ceil(doy/7);}
function weekStart(wn){return(wn-1)*7+1;}
function todayDOY(){const t=new Date();return t.getFullYear()===2026?doyFromDate(t):1;}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("en",{month:"short",day:"numeric",year:"numeric"});}

function togHabit(mi,d,el){const data=ldo(`h_${mi}`);data[d]=!data[d];svo(`h_${mi}`,data);el.classList.toggle("dn",data[d]);el.textContent=data[d]?"✓":d;}
function goDOY(doy){curDay=doy;showSection("days");renderDay(doy);}

// ── WEEK SELECTOR ─────────────────────────────────────────────────────────────
function renderWeekSel(){
  document.getElementById("accentStrip").style.background="linear-gradient(90deg,#C8C8E8,#D0C8F0,#C8D8F0)";
  let btns="";
  for(let w=1;w<=53;w++){const sd=weekStart(w);if(sd>365)break;const ed=Math.min(sd+6,365);const a=dateFromDOY(sd),b=dateFromDOY(ed);const fmt=d=>d.toLocaleDateString("en",{month:"short",day:"numeric"});btns+=`<button class="w-sel-btn" onclick="renderWeek(${w})"><div style="font-weight:900">Week ${w}</div><div class="w-sel-sub">${fmt(a)} – ${fmt(b)}</div></button>`;}
  document.getElementById("pageInner").innerHTML=`<div class="section-heading">Weekly Planner</div><div class="section-sub">52 weeks · generous writing space</div><div class="divider"></div><div class="week-sel-grid">${btns}</div>`;
}

// ── WEEKLY PAGE ───────────────────────────────────────────────────────────────
function renderWeek(wn){
  curWeek=wn;
  const sd=weekStart(wn),ed=Math.min(sd+6,365);
  const a=dateFromDOY(sd),b=dateFromDOY(ed);
  const fmt=d=>d.toLocaleDateString("en",{month:"long",day:"numeric"});
  const mi=monthForDOY(sd);const m=MONTHS[mi];
  document.getElementById("accentStrip").style.background=`linear-gradient(90deg,${m.accent},${m.border},transparent)`;
  const dayColors=[{bg:"#7088C8"},{bg:"#88A0C8"},{bg:"#90A8B8"},{bg:"#98B0A8"},{bg:"#A0A898"},{bg:"#C898A8"},{bg:"#D0A0A8"}];
  let dayBlocks="";
  for(let i=0;i<7;i++){
    const actualDOY=sd+i;
    if(actualDOY>365){dayBlocks+=`<div class="week-day-block"><div class="week-day-hdr" style="background:#CCC"><span class="week-day-name">${WDAYS_FULL[i===6?0:i+1]}</span></div></div>`;continue;}
    const d=dateFromDOY(actualDOY);const dow=d.getDay();const isWknd=dow===0||dow===6;
    const isToday=d.toDateString()===new Date().toDateString();
    const notes=ld(`wd_${actualDOY}`,"");const dc=dayColors[i];
    dayBlocks+=`<div class="week-day-block" style="${isToday?`border:2px solid ${dc.bg};`:""}">
      <div class="week-day-hdr" style="background:${dc.bg}">

        <span class="week-day-date" onclick="goDOY(${actualDOY})" style="cursor:pointer;">${d.toLocaleDateString("en",{month:"short",day:"numeric"})}${isToday?" 🌸":""}</span>
      </div>
      <textarea class="week-day-write ${isWknd?"wknd":""}" placeholder="Write freely about ${WDAYS_FULL[dow]}..." onchange="sv('wd_${actualDOY}',this.value)">${notes}</textarea>
    </div>`;
  }
  const intention=ld(`w_int_${wn}`),priorities=ld(`w_pri_${wn}`),gratitude=ld(`w_grat_${wn}`),reflection=ld(`w_ref_${wn}`);
  document.getElementById("pageInner").innerHTML=`
    <div class="nav-row">
      ${wn>1?`<button class="nav-btn" onclick="renderWeek(${wn-1})">◀ Week ${wn-1}</button>`:`<button class="nav-btn" onclick="renderWeekSel()">All Weeks</button>`}
      <button class="nav-btn" onclick="renderWeekSel()">All Weeks</button>
      ${wn<53?`<button class="nav-btn" onclick="renderWeek(${wn+1})">Week ${wn+1} ▶</button>`:`<div></div>`}
    </div>
    <div class="week-hero" style="background:${m.bg};border:1.5px solid ${m.border}">
      <div class="week-big-title" style="color:${m.dark}">📋 Week ${wn} of 2026</div>
      <div class="week-dates-lbl" style="color:${m.accent}">${fmt(a)} – ${fmt(b)}</div>
    </div>
    <div style="margin-bottom:12px"><div class="sec-label" style="color:${m.accent}">🌿 Weekly Intention</div><textarea class="box-textarea" style="min-height:60px;" placeholder="My focus and intention for this week..." onchange="sv('w_int_${wn}',this.value)">${intention}</textarea></div>
    <div class="week-day-list">${dayBlocks}</div>
    <div class="week-panels">
      <div class="week-panel"><div class="week-panel-lbl" style="color:${m.accent}">🎯 Top Priorities</div><textarea class="week-panel-area" placeholder="1. &#10;2. &#10;3. " onchange="sv('w_pri_${wn}',this.value)">${priorities}</textarea></div>
      <div class="week-panel"><div class="week-panel-lbl" style="color:${m.accent}">💕 Gratitude</div><textarea class="week-panel-area" placeholder="I'm grateful for..." onchange="sv('w_grat_${wn}',this.value)">${gratitude}</textarea></div>
    </div>
    <div class="week-panel-full"><div class="week-panel-lbl" style="color:${m.accent}">📝 Week in Review</div><textarea class="week-panel-area" style="min-height:100px;" placeholder="Looking back on this week..." onchange="sv('w_ref_${wn}',this.value)">${reflection}</textarea></div>
  `;

// ── DAILY PAGE ────────────────────────────────────────────────────────────────
function renderDay(doy){

  const m=MONTHS[mi];const dow=dt.getDay();

  const focus=ld(`d_foc_${doy}`),prayer=ld(`d_pr_${doy}`),evening=ld(`d_ev_${doy}`);

  // ── Today's To Do: tasks due on this day OR overdue (if viewing today)
  const todos=lda("todos");
  const PRI={high:"🔴",med:"🟡",low:"🟢"};
  const PRI_BG={high:"#FFF0F0",med:"#FFFBEE",low:"#EDFFF5"};
  const PRI_BORDER={high:"#F0C0C0",med:"#F0D8A0",low:"#A8DCC0"};
  const dueTasks=todos.filter(t=>{
    if(t.done)return false;

  const todoHtml=dueTasks.length>0?`

          return`<div style="display:flex;align-items:center;gap:9px;padding:9px 11px;background:${bg};border:1.5px solid ${border};border-radius:10px;border-left:3px solid ${isOverdue?"#E08888":border};">

            <div style="flex:1;min-width:0;">

              <div style="margin-top:2px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;">
                <span style="font-size:10px;font-weight:800;background:white;border-radius:7px;padding:1px 6px;color:var(--ink-mid)">${t.cat}</span>
                <span style="font-size:12px">${PRI[t.pri]||"🟡"}</span>
                ${isOverdue?`<span style="font-size:10px;font-weight:800;color:#C05060;background:#FFF0F0;border-radius:7px;padding:1px 6px;">🚨 Overdue</span>`:`<span style="font-size:10px;font-weight:800;color:${m.dark};background:${m.bg};border-radius:7px;padding:1px 6px;">📅 Due Today</span>`}

        <button onclick="showSection('todo')" style="width:100%;border:1.5px dashed ${m.border};border-radius:10px;padding:7px;background:transparent;font-size:11px;font-weight:800;color:${m.accent};cursor:pointer;font-family:'Nunito',sans-serif;">+ Add more in To Do tab</button>
      </div>

  :`<div class="day-section">
      <div class="day-lbl" style="color:${m.accent}">✅ Today's To Do</div>
      <div style="background:${m.bg};border:1.5px solid ${m.border};border-radius:10px;padding:10px 12px;text-align:center;">
        <div style="font-size:12px;font-weight:700;color:${m.accent};margin-bottom:6px;">No tasks due today 🌸</div>
        <button onclick="showSection('todo')" style="border:none;background:transparent;font-size:11px;font-weight:800;color:${m.accent};cursor:pointer;font-family:'Nunito',sans-serif;text-decoration:underline;">Open To Do list →</button>

  document.getElementById("pageInner").innerHTML=`

        <div class="day-title" style="color:${m.dark}">${m.name} ${dim}, 2026</div>
        <div class="day-weekday-lbl" style="color:${m.accent}">${WDAYS_FULL[dow]}${isToday?" · Today 🌸":""}</div>
      </div>
      <div class="day-badge" style="background:${m.bg};border:1.5px solid ${m.border}">
        <span class="day-badge-big" style="color:${m.dark}">Day ${doy}</span>
        <span class="day-badge-sub" style="color:${m.accent}">of 365 · wk ${wn}</span>
      </div>
    </div>

    <!-- ③ SCRIPTURE -->
    <div class="scripture-card" style="background:${m.bg};border:1.5px solid ${m.border}">
      <div class="scripture-txt" style="color:${m.dark}">"${verse}"</div>
    </div>

    <!-- ④ TOP 3 PRIORITIES -->
    <div class="pri3-card" style="background:${m.bg};border-color:${m.border};">
      <div class="day-lbl" style="color:${m.accent};margin-bottom:8px;">🎯 Top 3 Priorities</div>
      ${[
        {n:1,val:p1,done:p1d,key:`d_p1`,dkey:`d_p1d`,col:m.accent,ph:"Most important thing today..."},
        {n:2,val:p2,done:p2d,key:`d_p2`,dkey:`d_p2d`,col:m.border,ph:"Second priority..."},
        {n:3,val:p3,done:p3d,key:`d_p3`,dkey:`d_p3d`,col:m.border,ph:"Third priority..."},
      ].map(p=>`
        <div class="pri3-row">
          <div class="pri3-num" style="background:${p.n===1?m.accent:m.dark};opacity:${p.n===1?1:.55};">${p.n}</div>

            value="${p.val.replace(/"/g,'&quot;')}"
            style="${p.done?"text-decoration:line-through;opacity:.5;":""}"
            onchange="sv('${p.key}_${doy}',this.value)"/>

        const slots=[
          {h:5,label:"5",ampm:"AM",cls:"morning"},{h:6,label:"6",ampm:"AM",cls:"morning"},

          {h:9,label:"9",ampm:"AM",cls:"morning"},{h:10,label:"10",ampm:"AM",cls:"morning"},
          {h:11,label:"11",ampm:"AM",cls:"morning"},
          {h:12,label:"12",ampm:"PM",cls:"midday"},
          {h:13,label:"1",ampm:"PM",cls:"afternoon"},{h:14,label:"2",ampm:"PM",cls:"afternoon"},
          {h:15,label:"3",ampm:"PM",cls:"afternoon"},{h:16,label:"4",ampm:"PM",cls:"afternoon"},
          {h:17,label:"5",ampm:"PM",cls:"afternoon"},
          {h:18,label:"6",ampm:"PM",cls:"evening"},{h:19,label:"7",ampm:"PM",cls:"evening"},
          {h:20,label:"8",ampm:"PM",cls:"evening"},{h:21,label:"9",ampm:"PM",cls:"evening"},
          {h:22,label:"10",ampm:"PM",cls:"night"},{h:23,label:"11",ampm:"PM",cls:"night"},

  `;
}
function setMood(doy,i,btn){sv(`d_mo_${doy}`,i);btn.parentElement.querySelectorAll(".mood-b").forEach(b=>b.classList.remove("on"));btn.classList.add("on");}

function getDueBadge(dueDate){
  if(!dueDate)return'';
  const today=tds();
  const diff=Math.round((new Date(dueDate+"T12:00:00")-new Date(today+"T12:00:00"))/(864e5));
  if(diff<0)  return`<span class="due-badge overdue">🚨 Overdue ${Math.abs(diff)}d</span>`;
  if(diff===0)return`<span class="due-badge today">📅 Due Today</span>`;
  if(diff<=3) return`<span class="due-badge soon">🔔 Due in ${diff}d</span>`;
  return`<span class="due-badge normal">📅 ${new Date(dueDate+"T12:00:00").toLocaleDateString("en",{month:"short",day:"numeric"})}</span>`;
}

  const overdueList=allActive.filter(t=>t.due&&t.due<today);
  // Apply filter

  if(todoFilter==="Active")filtered=todos.filter(t=>!t.done);
  else if(todoFilter==="Done")filtered=todos.filter(t=>t.done);

      <div style="font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-light);margin-bottom:10px;">✦ New Task</div>

        style="width:100%;border:1.5px solid #EDE8F0;border-radius:10px;padding:9px 12px;margin-bottom:8px;background:#FAFAFA;"

function addTodo(){
  const text=document.getElementById("todoText")?.value?.trim();if(!text)return;
  const cat=document.getElementById("todoCatSel")?.value||"Personal";
  const due=document.getElementById("todoDue")?.value||"";
  const note=document.getElementById("todoNote")?.value?.trim()||"";
  const todos=lda("todos");
  todos.unshift({id:Date.now().toString(),text,cat,pri:todoPri,done:false,date:tds(),due,note,subtasks:[],kanbanCol:"todo"});
  sva("todos",todos);
  renderTodo();
  // panel closes after re-render since renderTodo rebuilds everything
}

// Fix: update priority WITHOUT re-rendering the whole form (preserves typed text)
function setPriority(pri){
  todoPri=pri;
  const PRI_COLORS={high:{bg:"#FFF0F0",border:"#F0C0C0"},med:{bg:"#FFFBEE",border:"#F0D8A0"},low:{bg:"#EDFFF5",border:"#A8DCC0"}};
  const labels={high:{bg:PRI_COLORS.high.bg,border:PRI_COLORS.high.border,color:"#C05060"},
                med:{bg:PRI_COLORS.med.bg,border:PRI_COLORS.med.border,color:"#A07020"},
                low:{bg:PRI_COLORS.low.bg,border:PRI_COLORS.low.border,color:"#3A8860"}};
  ["high","med","low"].forEach(p=>{
    const btn=document.getElementById("pri-"+p);
    if(!btn)return;
    btn.classList.toggle("on",p===pri);
    if(p===pri){
      btn.style.background=labels[p].bg;
      btn.style.borderColor=labels[p].border;
      btn.style.color=labels[p].color;
    } else {
      btn.style.background="";
      btn.style.borderColor="";
      btn.style.color="";
    }
  });
}

function toggleNewNote(){
  const ta=document.getElementById("todoNote");
  const btn=document.getElementById("noteToggleBtn");
  if(!ta||!btn)return;
  const open=ta.style.display==="none";
  ta.style.display=open?"block":"none";
  btn.textContent=open?"✕ Hide":"＋ Add note";
  if(open)setTimeout(()=>ta.focus(),50);
}
function toggleTodo(id){const todos=lda("todos");const t=todos.find(t=>t.id===id);if(t){t.done=!t.done;if(t.done){t.doneDate=tds();t.kanbanCol="done";}else t.kanbanCol="todo";}sva("todos",todos);renderTodo();}
function deleteTodo(id){sva("todos",lda("todos").filter(t=>t.id!==id));renderTodo();}
function updateTodoField(id,field,val){const todos=lda("todos");const t=todos.find(t=>t.id===id);if(t)t[field]=val;sva("todos",todos);}

function openAddTaskPanel(){
  const p=document.getElementById("addTaskPanel");
  if(!p)return;
  p.style.display="block";
  setTimeout(()=>document.getElementById("todoText")?.focus(),60);
  // scroll into view
  p.scrollIntoView({behavior:"smooth",block:"nearest"});
}
function closeAddTaskPanel(){
  const p=document.getElementById("addTaskPanel");
  if(p)p.style.display="none";
}

// ── CLEAR DONE ─────────────────────────────────────────────────────────────────
function clearDoneTasks(){
  if(!confirm("Remove all completed tasks?"))return;
  sva("todos",lda("todos").filter(t=>!t.done));
  renderTodo();
}

// ── INLINE SUBTASK HELPERS (v2 — for new td2 card design) ──────────────────────
function inlineAddSub2(tid){
  const input=document.getElementById("tsi-"+tid);
  const text=input?.value?.trim();if(!text)return;
  const todos=lda("todos");const t=todos.find(t=>t.id===tid);if(!t)return;
  if(!t.subtasks)t.subtasks=[];
  t.subtasks.push({text,done:false});
  sva("todos",todos);
  input.value="";
  renderTodo();
  // keep focus on the same card's input after re-render
  setTimeout(()=>document.getElementById("tsi-"+tid)?.focus(),60);
}
function inlineToggleSub2(tid,idx){
  const todos=lda("todos");const t=todos.find(t=>t.id===tid);
  if(!t||!t.subtasks)return;
  t.subtasks[idx].done=!t.subtasks[idx].done;
  sva("todos",todos);renderTodo();
}
function inlineDelSub2(tid,idx){
  const todos=lda("todos");const t=todos.find(t=>t.id===tid);
  if(!t||!t.subtasks)return;
  t.subtasks.splice(idx,1);
  sva("todos",todos);renderTodo();
}

function closeTaskModal(){document.getElementById("taskModalOv")?.remove();}
function addSubtask(taskId){const text=document.getElementById("subtaskText")?.value?.trim();if(!text)return;const todos=lda("todos");const t=todos.find(t=>t.id===taskId);if(!t)return;if(!t.subtasks)t.subtasks=[];t.subtasks.push({text,done:false});sva("todos",todos);closeTaskModal();openTaskModal(taskId);}
function toggleSubtask(taskId,idx){const todos=lda("todos");const t=todos.find(t=>t.id===taskId);if(!t||!t.subtasks)return;t.subtasks[idx].done=!t.subtasks[idx].done;sva("todos",todos);closeTaskModal();openTaskModal(taskId);}
function delSubtask(taskId,idx){const todos=lda("todos");const t=todos.find(t=>t.id===taskId);if(!t||!t.subtasks)return;t.subtasks.splice(idx,1);sva("todos",todos);closeTaskModal();openTaskModal(taskId);}
function setKanbanCol(taskId,col){const todos=lda("todos");const t=todos.find(t=>t.id===taskId);if(!t)return;t.kanbanCol=col;if(col==="done"){t.done=true;t.doneDate=tds();}else t.done=false;sva("todos",todos);closeTaskModal();openTaskModal(taskId);}

// ── INLINE SUBTASK HELPERS ─────────────────────────────────────────────────────
function toggleQuickSub(tid){
  const row=document.getElementById("qsr-"+tid);
  const lbl=document.getElementById("qst-"+tid);
  if(!row)return;
  const open=row.style.display==="none";
  row.style.display=open?"flex":"none";
  if(lbl)lbl.textContent=open?"✕ Cancel":"＋ Add subtask";
  if(open)setTimeout(()=>document.getElementById("qsi-"+tid)?.focus(),50);
}

function inlineAddSub(tid){
  const input=document.getElementById("qsi-"+tid);
  const text=input?.value?.trim();if(!text)return;
  const todos=lda("todos");const t=todos.find(t=>t.id===tid);if(!t)return;
  if(!t.subtasks)t.subtasks=[];
  t.subtasks.push({text,done:false});
  sva("todos",todos);
  // Re-render just this card
  const card=document.getElementById("ti-"+tid);
  if(card){
    const pc={high:{bg:"#FFF0F0",border:"#F0C0C0",dot:"🔴"},med:{bg:"#FFFBEE",border:"#F0D8A0",dot:"🟡"},low:{bg:"#EDFFF5",border:"#A8DCC0",dot:"🟢"}};
    renderTodo();
    // Scroll card back into view and re-open quick add
    setTimeout(()=>{
      const newCard=document.getElementById("ti-"+tid);
      if(newCard)newCard.scrollIntoView({block:"nearest",behavior:"smooth"});
      toggleQuickSub(tid);
    },60);
  }
}

function inlineToggleSub(tid,idx){
  const todos=lda("todos");const t=todos.find(t=>t.id===tid);
  if(!t||!t.subtasks)return;
  t.subtasks[idx].done=!t.subtasks[idx].done;
  sva("todos",todos);
  // Update just the affected elements without full re-render
  const chk=document.querySelector(`#ti-${tid} .inline-st-chk:nth-of-type(${idx+1})`);
  const txt=document.querySelector(`#ti-${tid} .inline-st-text:nth-of-type(${idx+1})`);
  // Simpler: just re-render the todo tab
  renderTodo();
  setTimeout(()=>{document.getElementById("ti-"+tid)?.scrollIntoView({block:"nearest",behavior:"smooth"});},50);
}

function inlineDelSub(tid,idx){
  const todos=lda("todos");const t=todos.find(t=>t.id===tid);
  if(!t||!t.subtasks)return;
  t.subtasks.splice(idx,1);
  sva("todos",todos);renderTodo();
}

// ── KANBAN BOARD ───────────────────────────────────────────────────────────────
function renderKanban(){
  document.getElementById("accentStrip").style.background=ACCENT_STRIPS.kanban;
  const todos=lda("todos");
  const PRI_COLOR={high:"#F0A0A8",med:"#F0C880",low:"#88C8A0"};
  const PRI={high:"🔴",med:"🟡",low:"🟢"};
  function colCards(col){
    const cards=todos.filter(t=>col==="done"?(t.done||(t.kanbanCol==="done"&&t.done)):(!t.done&&(t.kanbanCol||"todo")===col));
    return cards.map(t=>{
      const subs=t.subtasks||[];const subDone=subs.filter(s=>s.done).length;
      return`<div class="kanban-card" onclick="openKanbanTask('${t.id}')">
        <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:${PRI_COLOR[t.pri]||PRI_COLOR.med};border-radius:3px 0 0 3px;"></div>
        <div style="padding-left:6px;"><div class="kc-text">${t.text}</div>
          <div class="kc-meta"><span style="font-size:9px;background:#F5EEF8;border-radius:6px;padding:1px 5px;font-weight:800;color:var(--ink-light)">${t.cat}</span>
            <span style="font-size:11px;">${PRI[t.pri]||"🟡"}</span>
            ${subs.length?`<span style="font-size:9px;font-weight:800;color:var(--mint-d);background:var(--mint-s);border-radius:6px;padding:1px 5px;">${subDone}/${subs.length}</span>`:""}
            ${getDueBadge(t.due)}${t.note?.trim()?`<span style="font-size:10px;color:var(--ink-light)">📝</span>`:""}
          </div>
        </div>
      </div>`;
    }).join("")||`<div style="font-size:11px;color:var(--ink-light);text-align:center;padding:12px 4px;">Empty</div>`;
  }
  const todoCnt=todos.filter(t=>!t.done&&(t.kanbanCol||"todo")==="todo").length;
  const doingCnt=todos.filter(t=>!t.done&&t.kanbanCol==="doing").length;
  const doneCnt=todos.filter(t=>t.done).length;
  const total=todos.length;const pct=total>0?Math.round(doneCnt/total*100):0;
  document.getElementById("pageInner").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div><div class="section-heading" style="margin-bottom:0;">🗂️ Kanban Board</div><div style="font-size:11px;font-weight:700;color:var(--ink-light);margin-top:2px;">Tap any card to move or expand</div></div>
      <button onclick="showSection('todo')" style="border:1.5px solid #D0C8E8;border-radius:10px;padding:6px 12px;background:white;font-size:11px;font-weight:800;color:#6858A8;cursor:pointer;font-family:'Nunito',sans-serif;">← To Do</button>
    </div>
    <div style="background:white;border-radius:12px;padding:10px 14px;margin-bottom:14px;border:1.5px solid rgba(200,190,230,.3);display:flex;align-items:center;gap:12px;">
      <div style="flex:1;height:8px;background:#F0EAF8;border-radius:4px;overflow:hidden;"><div style="height:100%;background:linear-gradient(90deg,#B0A0D8,#C8B8E8);border-radius:4px;width:${pct}%;transition:width .6s;"></div></div>
      <div style="font-size:12px;font-weight:800;color:#6858A8;flex-shrink:0;">${doneCnt}/${total} · ${pct}%</div>
    </div>
    <div class="kanban-board">
      <div class="kanban-col col-todo"><div class="kanban-col-hdr"><div class="kanban-col-title" style="color:#6858A8">📋 To Do</div><div class="kanban-col-count" style="color:#6858A8">${todoCnt}</div></div><div class="kanban-cards">${colCards("todo")}</div><button class="kanban-add-btn" onclick="showSection('todo')">+ Add Task</button></div>
      <div class="kanban-col col-doing"><div class="kanban-col-hdr"><div class="kanban-col-title" style="color:#A07820">⚡ In Progress</div><div class="kanban-col-count" style="color:#A07820">${doingCnt}</div></div><div class="kanban-cards">${colCards("doing")}</div></div>
      <div class="kanban-col col-done"><div class="kanban-col-hdr"><div class="kanban-col-title" style="color:#3A8860">✅ Done</div><div class="kanban-col-count" style="color:#3A8860">${doneCnt}</div></div><div class="kanban-cards">${colCards("done")}</div></div>
    </div>
  `;
}
function openKanbanTask(id){openTaskModal(id);}

// ── BIBLE READING TRACKER ─────────────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
function renderBible(){
  document.getElementById("accentStrip").style.background="linear-gradient(90deg,#F0D8B0,#E8C890,#F0E0B0)";
  const bData=ldo("bible_data");
  const totalChaps=[...BIBLE_OT,...BIBLE_NT].reduce((s,b)=>s+b.c,0);
  const readChaps=Object.values(bData).reduce((s,v)=>s+Object.values(v).filter(Boolean).length,0);
  const pct=Math.round((readChaps/totalChaps)*100);
  function bookSection(books,label){
    return`<div class="bible-testament">
      <div class="bt-heading">${label}</div>
      <div class="bible-book-grid">
        ${books.map(b=>{
          const key=b.n.replace(/\s/g,"_");const brd=bData[key]||{};const rdCnt=Object.values(brd).filter(Boolean).length;const bpct=Math.round((rdCnt/b.c)*100);
          const isExp=bibleExpanded===key;
          return`<div class="bible-book-card" onclick="bibleExpanded=bibleExpanded==='${key}'?null:'${key}';renderBible()">
            <div class="bbc-top"><div class="bbc-name">${b.n}</div><div class="bbc-prog">${rdCnt}/${b.c}</div></div>
            <div class="bbc-bar-wrap"><div class="bbc-bar" style="width:${bpct}%"></div></div>
            ${isExp?`<div class="bbc-chapters">
              ${Array.from({length:b.c},(_,i)=>{const done=brd[i+1];return`<div class="bcc ${done?"rd":""}" onclick="event.stopPropagation();toggleBibleChap('${key}',${i+1})" title="Ch.${i+1}">${i+1}</div>`;}).join("")}
            </div>`:""}
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }
  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">Bible Reading Tracker</div>
    <div class="section-sub">📖 Track every chapter you read</div>
    <div class="divider"></div>
    <div class="bible-stats">
      <div class="bs-card"><div class="bs-val">${readChaps}</div><div class="bs-lbl">Chapters Read</div></div>
      <div class="bs-card"><div class="bs-val">${pct}%</div><div class="bs-lbl">Bible Complete</div></div>
      <div class="bs-card"><div class="bs-val">${totalChaps-readChaps}</div><div class="bs-lbl">Remaining</div></div>
    </div>
    <div style="background:var(--gold-pale);border:1.5px solid rgba(200,168,72,.3);border-radius:12px;padding:10px 14px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:800;color:#8A6820;margin-bottom:5px;"><span>Overall Progress</span><span>${pct}%</span></div>
      <div style="height:8px;background:rgba(200,168,72,.2);border-radius:4px;overflow:hidden;"><div style="height:100%;border-radius:4px;background:linear-gradient(90deg,#D4A828,#F0C850);width:${pct}%;transition:width .6s ease;"></div></div>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--ink-light);margin-bottom:12px;text-align:center;">Tap a book to expand chapters · tap a chapter to mark as read</div>
    ${bookSection(BIBLE_OT,"📜 Old Testament")}
    ${bookSection(BIBLE_NT,"✝️ New Testament")}
  `;
}
function toggleBibleChap(bookKey,chap){const bData=ldo("bible_data");if(!bData[bookKey])bData[bookKey]={};bData[bookKey][chap]=!bData[bookKey][chap];svo("bible_data",bData);renderBible();}

function renderInventory(){
  document.getElementById("accentStrip").style.background="linear-gradient(90deg,#C8D8E8,#B8C8D8,#C8D0E8)";
  const items=lda("inventory");
  const filtered=invFilter==="All"?items:items.filter(i=>i.cat===invFilter);
  const lowStock=items.filter(i=>i.qty<=i.min);
  const CAT_COLORS={Food:"#A8D8B0",Household:"#A8C8D8",Personal:"#D8A8C0","Personal Care":"#D8A8C0",Office:"#B8A8D8",Clothing:"#D8C0A8",Electronics:"#A8B8D8",Medical:"#D8B0B0",Other:"#C8C8A8"};
  // ── Inventory stats
  const totalItems=items.length;
  const totalQty=items.reduce((s,i)=>s+i.qty,0);
  const lowStockCount=lowStock.length;
  const outOfStock=items.filter(i=>i.qty===0).length;

  const topInvCat=Object.entries(catBreakdown).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById("pageInner").innerHTML=`
    <div class="section-heading">Inventory Tracker</div>
    <div class="section-sub">📦 Keep track of what you have</div>
    <div class="divider"></div>

    <!-- STATS BOXES -->

        <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:#4878A8;">${totalItems}</div>
        <div style="font-size:9px;font-weight:900;color:var(--ink-light);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;">📦 Total Items</div>

        <div style="font-size:9px;font-weight:900;color:var(--ink-light);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;">🔢 Total Units</div>

        <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:${lowStockCount?"#C07878":"#3A8860"};">${lowStockCount}</div>
